spring.application.name=QLTD
server.port=8083

# Load local overrides (gitignored) - overrides values below
# Create application-local.properties with your secrets
spring.config.import=optional:classpath:application-local.properties


# ============================================
# MySQL Database Configuration (Docker)
# ============================================
spring.datasource.url=jdbc:mysql://localhost:8085/qltd_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=qltd_user
spring.datasource.password=qltd_pass123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / Hibernate Configuration
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# Connection Pool (HikariCP)
# ============================================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# ============================================
# Error Handling
# ============================================
spring.web.error.path=/error

# ============================================
# Thymeleaf Configuration
# ============================================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML

# ============================================
# File Upload (for CV scoring)
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=16MB

# ============================================
# Gmail SMTP (dùng để gửi OTP 2FA)
# Yêu cầu: bật 2-Step Verification trên Gmail → tạo App Password
# Hướng dẫn: https://myaccount.google.com/apppasswords
# ============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ============================================
# Google OAuth2 Login
# Lấy credentials tại: https://console.cloud.google.com/ → APIs & Services → Credentials
# Authorized redirect URI: http://localhost:8083/login/oauth2/code/google
# ============================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# GitHub OAuth2
# Tạo OAuth App tại: https://github.com/settings/developers
# Authorized callback URL: http://localhost:8083/login/oauth2/code/github
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# ============================================
# Gemini AI API Key
# Dùng cho CV parsing, scoring, job matching
# Set via environment variable: GEMINI_API_KEY
# Or create src/main/resources/application-local.properties (gitignored)
# and add: gemini.api.key=YOUR_KEY_HERE
# ============================================
gemini.api.key=${GEMINI_API_KEY:}

# ============================================
# ============================================
claude.api.key=${CLAUDE_API_KEY:}

# ============================================
# Firebase Storage (image upload)
# Example:
# firebase.storage.enabled=true
# firebase.storage.bucket=your-project.firebasestorage.app
# firebase.storage.service-account-path=file:/absolute/path/to/serviceAccountKey.json
# ============================================
firebase.storage.enabled=${FIREBASE_STORAGE_ENABLED:false}
firebase.storage.bucket=${FIREBASE_STORAGE_BUCKET:}
firebase.storage.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}
firebase.storage.max-image-size-bytes=${FIREBASE_STORAGE_MAX_IMAGE_SIZE_BYTES:15728640}
