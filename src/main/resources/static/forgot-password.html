<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quên mật khẩu - CoHoiViecLam</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(29, 78, 216, 0.12);
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      text-align: center;
    }

    .logo { margin-bottom: 24px; }
    .logo img { height: 48px; }

    .step-icon {
      width: 72px; height: 72px;
      background: #EFF6FF;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
    }
    .step-icon svg { width: 36px; height: 36px; }

    h1 { font-size: 22px; color: #111827; margin-bottom: 8px; }
    .subtitle { color: #6b7280; font-size: 14px; line-height: 1.6; margin-bottom: 28px; }
    .highlight { font-weight: 600; color: #1D4ED8; }

    /* Steps indicator */
    .steps {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 32px;
    }
    .step-dot {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #e5e7eb;
      color: #9ca3af;
      font-size: 13px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s;
    }
    .step-dot.active { background: #1D4ED8; color: #fff; }
    .step-dot.done   { background: #16a34a; color: #fff; }
    .step-line {
      flex: 1; height: 2px;
      background: #e5e7eb;
      max-width: 60px;
      transition: background 0.3s;
    }
    .step-line.done { background: #16a34a; }

    /* Form elements */
    .form-group { margin-bottom: 16px; text-align: left; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .form-input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px; font-size: 15px; color: #111827;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
      border-color: #1D4ED8;
      box-shadow: 0 0 0 3px rgba(29,78,216,0.1);
    }

    /* OTP inputs */
    .otp-inputs {
      display: flex; gap: 10px; justify-content: center; margin-bottom: 24px;
    }
    .otp-inputs input {
      width: 52px; height: 60px;
      border: 2px solid #d1d5db; border-radius: 10px;
      font-size: 24px; font-weight: 700; text-align: center; color: #111827;
      transition: border-color 0.2s, box-shadow 0.2s; outline: none;
    }
    .otp-inputs input:focus { border-color: #1D4ED8; box-shadow: 0 0 0 3px rgba(29,78,216,0.15); }
    .otp-inputs input.filled { border-color: #1D4ED8; background: #EFF6FF; }
    .otp-inputs input.error { border-color: #ef4444; background: #fef2f2; }

    /* Password input wrapper */
    .password-wrapper { position: relative; }
    .password-wrapper .form-input { padding-right: 44px; }
    .btn-toggle-pw {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: #9ca3af; padding: 4px;
    }

    .btn-primary {
      width: 100%; padding: 14px;
      background: #1D4ED8; color: #fff;
      border: none; border-radius: 10px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 16px;
    }
    .btn-primary:hover { background: #1e40af; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }

    .resend-row {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; font-size: 14px; color: #6b7280;
    }
    .btn-resend {
      background: none; border: none; color: #1D4ED8;
      font-size: 14px; font-weight: 600; cursor: pointer; padding: 0;
      text-decoration: underline;
    }
    .btn-resend:disabled { color: #9ca3af; cursor: not-allowed; text-decoration: none; }
    .countdown { font-weight: 600; color: #1D4ED8; min-width: 32px; }

    .msg {
      padding: 10px 14px; border-radius: 8px;
      font-size: 14px; margin-bottom: 16px; display: none;
    }
    .msg.error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; display: block; }
    .msg.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; display: block; }

    .back-link {
      display: inline-block; margin-top: 16px;
      font-size: 13px; color: #9ca3af; text-decoration: none;
    }
    .back-link:hover { color: #6b7280; }

    .step { display: none; }
    .step.active { display: block; }

    .password-hint { font-size: 12px; color: #9ca3af; margin-top: 4px; }
    .strength-bar { height: 4px; border-radius: 2px; background: #e5e7eb; margin-top: 6px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <a href="/index.html"><img src="/images/logo.png" alt="CoHoiViecLam" onerror="this.style.display='none'" /></a>
    </div>

    <!-- Steps indicator -->
    <div class="steps">
      <div class="step-dot active" id="dot1">1</div>
      <div class="step-line" id="line1"></div>
      <div class="step-dot" id="dot2">2</div>
      <div class="step-line" id="line2"></div>
      <div class="step-dot" id="dot3">3</div>
    </div>

    <div id="msg" class="msg"></div>

    <!-- BƯỚC 1: Nhập email -->
    <div class="step active" id="step1">
      <div class="step-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1D4ED8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <h1>Quên mật khẩu</h1>
      <p class="subtitle">Nhập email đăng ký để nhận mã OTP xác thực</p>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="emailInput" class="form-input" placeholder="your@email.com" />
      </div>
      <button class="btn-primary" id="btnSendOtp" onclick="sendOtp()">Gửi mã OTP</button>
      <br>
      <a href="javascript:history.back()" class="back-link">← Quay lại đăng nhập</a>
    </div>

    <!-- BƯỚC 2: Nhập OTP -->
    <div class="step" id="step2">
      <div class="step-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1D4ED8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1>Nhập mã OTP</h1>
      <p class="subtitle">Mã 6 chữ số đã gửi đến<br><span class="highlight" id="emailShow"></span></p>
      <div class="otp-inputs" id="otpInputs">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code"/>
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]"/>
      </div>
      <button class="btn-primary" id="btnVerifyOtp" onclick="verifyOtp()">Xác nhận</button>
      <div class="resend-row">
        <span>Không nhận được?</span>
        <button class="btn-resend" id="btnResend" onclick="resendOtp()" disabled>Gửi lại</button>
        <span class="countdown" id="countdown"></span>
      </div>
    </div>

    <!-- BƯỚC 3: Đặt mật khẩu mới -->
    <div class="step" id="step3">
      <div class="step-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1D4ED8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <polyline points="9 12 11 14 15 10"/>
        </svg>
      </div>
      <h1>Mật khẩu mới</h1>
      <p class="subtitle">Tạo mật khẩu mới cho tài khoản của bạn</p>
      <div class="form-group">
        <label class="form-label">Mật khẩu mới</label>
        <div class="password-wrapper">
          <input type="password" id="newPassword" class="form-input" placeholder="Tối thiểu 6 ký tự" oninput="checkStrength()" />
          <button type="button" class="btn-toggle-pw" onclick="togglePw('newPassword', this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="password-hint" id="strengthText"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Xác nhận mật khẩu</label>
        <div class="password-wrapper">
          <input type="password" id="confirmPassword" class="form-input" placeholder="Nhập lại mật khẩu" />
          <button type="button" class="btn-toggle-pw" onclick="togglePw('confirmPassword', this)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button class="btn-primary" id="btnReset" onclick="resetPassword()">Đặt lại mật khẩu</button>
    </div>
  </div>

  <script>
    let currentEmail = '';
    let countdownTimer;

    const msgEl = document.getElementById('msg');

    function showMsg(text, type) {
      msgEl.textContent = text;
      msgEl.className = 'msg ' + type;
    }
    function clearMsg() { msgEl.className = 'msg'; }

    function goStep(n) {
      document.querySelectorAll('.step').forEach((s, i) => s.classList.toggle('active', i + 1 === n));
      [1, 2, 3].forEach(i => {
        const dot  = document.getElementById('dot' + i);
        dot.classList.toggle('active', i === n);
        dot.classList.toggle('done',   i < n);
        if (i < 3) {
          document.getElementById('line' + i).classList.toggle('done', i < n);
        }
      });
      clearMsg();
    }

    // ── BƯỚC 1: Gửi OTP ──
    async function sendOtp() {
      const email = document.getElementById('emailInput').value.trim();
      if (!email) { showMsg('Vui lòng nhập email', 'error'); return; }

      const btn = document.getElementById('btnSendOtp');
      btn.disabled = true; btn.textContent = 'Đang gửi...';

      try {
        const res  = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (data.success) {
          currentEmail = email;
          document.getElementById('emailShow').textContent = email;
          goStep(2);
          startCountdown(60);
          document.querySelector('#otpInputs input').focus();
          if (!data.mailSent) showMsg('Không thể gửi email, nhấn "Gửi lại" để thử lại', 'error');
        } else {
          showMsg(data.message, 'error');
        }
      } catch { showMsg('Lỗi kết nối, vui lòng thử lại', 'error'); }
      finally { btn.disabled = false; btn.textContent = 'Gửi mã OTP'; }
    }

    // ── BƯỚC 2: Xác thực OTP ──
    const otpInputs = [...document.querySelectorAll('#otpInputs input')];
    otpInputs.forEach((inp, i) => {
      inp.addEventListener('input', () => {
        inp.value = inp.value.replace(/\D/g, '').slice(-1);
        inp.classList.toggle('filled', inp.value !== '');
        clearMsg();
        if (inp.value && i < 5) otpInputs[i + 1].focus();
      });
      inp.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !inp.value && i > 0) otpInputs[i - 1].focus();
      });
      inp.addEventListener('paste', e => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
        text.split('').forEach((ch, idx) => {
          if (otpInputs[idx]) { otpInputs[idx].value = ch; otpInputs[idx].classList.add('filled'); }
        });
        if (text.length > 0) otpInputs[Math.min(text.length, 5)].focus();
      });
    });

    function getOtp() { return otpInputs.map(i => i.value).join(''); }

    async function verifyOtp() {
      const otp = getOtp();
      if (otp.length < 6) { showMsg('Vui lòng nhập đủ 6 chữ số', 'error'); return; }

      const btn = document.getElementById('btnVerifyOtp');
      btn.disabled = true; btn.textContent = 'Đang xác thực...';

      try {
        const res  = await fetch('/api/auth/verify-reset-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email: currentEmail, otp })
        });
        const data = await res.json();
        if (data.success) {
          clearInterval(countdownTimer);
          goStep(3);
          document.getElementById('newPassword').focus();
        } else {
          showMsg(data.message || 'Mã OTP không đúng', 'error');
          otpInputs.forEach(i => { i.classList.add('error'); i.value = ''; i.classList.remove('filled'); });
          otpInputs[0].focus();
        }
      } catch { showMsg('Lỗi kết nối, vui lòng thử lại', 'error'); }
      finally { btn.disabled = false; btn.textContent = 'Xác nhận'; }
    }

    async function resendOtp() {
      const btn = document.getElementById('btnResend');
      btn.disabled = true;
      try {
        const res  = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email: currentEmail })
        });
        const data = await res.json();
        if (data.success) {
          showMsg('Đã gửi lại mã OTP', 'success');
          startCountdown(60);
          otpInputs.forEach(i => { i.value = ''; i.classList.remove('filled', 'error'); });
          otpInputs[0].focus();
        } else {
          showMsg(data.message, 'error');
          btn.disabled = false;
        }
      } catch { showMsg('Lỗi kết nối', 'error'); btn.disabled = false; }
    }

    function startCountdown(seconds) {
      clearInterval(countdownTimer);
      document.getElementById('btnResend').disabled = true;
      let remaining = seconds;
      const el = document.getElementById('countdown');
      el.textContent = `(${remaining}s)`;
      countdownTimer = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(countdownTimer);
          el.textContent = '';
          document.getElementById('btnResend').disabled = false;
        } else {
          el.textContent = `(${remaining}s)`;
        }
      }, 1000);
    }

    // ── BƯỚC 3: Đặt mật khẩu ──
    function checkStrength() {
      const val  = document.getElementById('newPassword').value;
      const fill = document.getElementById('strengthFill');
      const text = document.getElementById('strengthText');
      let score  = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = [
        { w: '20%',  bg: '#ef4444', label: 'Rất yếu' },
        { w: '40%',  bg: '#f97316', label: 'Yếu' },
        { w: '60%',  bg: '#eab308', label: 'Trung bình' },
        { w: '80%',  bg: '#22c55e', label: 'Mạnh' },
        { w: '100%', bg: '#16a34a', label: 'Rất mạnh' },
      ];
      const lv = levels[Math.max(0, score - 1)];
      if (val.length === 0) { fill.style.width = '0'; text.textContent = ''; return; }
      fill.style.width = lv.w; fill.style.background = lv.bg;
      text.textContent = lv.label; text.style.color = lv.bg;
    }

    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    async function resetPassword() {
      const newPassword     = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword.length < 6) { showMsg('Mật khẩu phải có ít nhất 6 ký tự', 'error'); return; }
      if (newPassword !== confirmPassword) { showMsg('Mật khẩu xác nhận không khớp', 'error'); return; }

      const btn = document.getElementById('btnReset');
      btn.disabled = true; btn.textContent = 'Đang xử lý...';

      try {
        const res  = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ newPassword, confirmPassword })
        });
        const data = await res.json();
        if (data.success) {
          showMsg('Đặt lại mật khẩu thành công! Đang chuyển hướng...', 'success');
          setTimeout(() => { window.location.href = '/candidate-register.html'; }, 1800);
        } else {
          showMsg(data.message, 'error');
        }
      } catch { showMsg('Lỗi kết nối, vui lòng thử lại', 'error'); }
      finally { btn.disabled = false; btn.textContent = 'Đặt lại mật khẩu'; }
    }
  </script>
</body>
</html>
