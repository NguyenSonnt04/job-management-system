<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử Chat - AI Assistant</title>
    <link rel="stylesheet" href="chatbot-history.css">
</head>
<body>
    <div class="history-container">
        <div class="history-header">
            <h2>📜 Lịch sử Chat</h2>
            <button class="history-close" onclick="closeHistory()">✕</button>
        </div>

        <div class="history-list" id="historyList">
            <!-- Dynamic content -->
        </div>

        <div class="history-actions">
            <button class="btn btn-secondary" onclick="exportHistory()">📥 Export</button>
            <button class="btn btn-danger" onclick="clearHistory()">🗑️ Xóa tất cả</button>
        </div>
    </div>

    <script>
        let currentUserId = null;

        // Get user ID từ localStorage
        async function getUserId() {
            if (currentUserId) return currentUserId;

            let userId = localStorage.getItem('chatbot_user_id');
            if (!userId) {
                try {
                    const response = await fetch('/api/user/me', { credentials: 'include' });
                    const data = await response.json();
                    userId = data.authenticated && data.id ? 'user_' + data.id : 'guest_' + Date.now();
                } catch {
                    userId = 'guest_' + Date.now();
                }
                localStorage.setItem('chatbot_user_id', userId);
            }
            currentUserId = userId;
            return userId;
        }

        function getHistoryKey(userId) {
            return 'chatbot_history_' + userId;
        }

        async function loadHistory() {
            const list = document.getElementById('historyList');
            const userId = await getUserId();
            const historyKey = getHistoryKey(userId);
            const history = getHistory(historyKey);

            if (history.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <p>Chưa có lịch sử chat</p>
                        <small>Bắt đầu chat với AI Assistant ngay!</small>
                    </div>
                `;
            } else {
                list.innerHTML = history.map(item => `
                    <div class="history-item" onclick="copyToClipboard('${escapeHtml(item.answer)}')">
                        <div class="history-question">Q: ${escapeHtml(item.question)}</div>
                        <div class="history-answer">A: ${escapeHtml(item.answer)}</div>
                        <div class="history-time">${new Date(item.timestamp).toLocaleString('vi-VN')}</div>
                    </div>
                `).reverse().join('');
            }
        }

        function getHistory(historyKey) {
            try {
                const history = localStorage.getItem(historyKey);
                return history ? JSON.parse(history) : [];
            } catch (e) {
                console.error('Error loading chat history:', e);
                return [];
            }
        }

        async function clearHistory() {
            if (confirm('Xóa toàn bộ lịch sử chat?')) {
                const userId = await getUserId();
                const historyKey = getHistoryKey(userId);
                localStorage.removeItem(historyKey);
                await loadHistory();
            }
        }

        function closeHistory() {
            // Gửi message về parent window để đóng
            if (window.parent !== window) {
                window.parent.postMessage({ action: 'closeHistory' }, '*');
            }
            window.close();
        }

        async function exportHistory() {
            const userId = await getUserId();
            const historyKey = getHistoryKey(userId);
            const history = getHistory(historyKey);

            if (history.length === 0) {
                alert('Không có lịch sử để export!');
                return;
            }

            let text = 'Lịch sử Chat - AI Assistant\n';
            text += `User: ${userId}\n`;
            text += '='.repeat(40) + '\n\n';

            history.forEach(item => {
                text += `Q: ${item.question}\n`;
                text += `A: ${item.answer}\n`;
                text += `Thời gian: ${new Date(item.timestamp).toLocaleString('vi-VN')}\n`;
                text += '-'.repeat(40) + '\n\n';
            });

            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `chat-history-${userId.substring(5, 15)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                // Hiển thị thông báo nhỏ
                const tooltip = document.createElement('div');
                tooltip.textContent = '✓ Đã copy!';
                tooltip.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    background: #10b981;
                    color: white;
                    padding: 8px 16px;
                    border-radius: 8px;
                    font-size: 12px;
                    z-index: 10000;
                    animation: fadeOut 2s forwards;
                `;
                document.body.appendChild(tooltip);
                setTimeout(() => tooltip.remove(), 2000);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Auto refresh mỗi 5 giây
        setInterval(loadHistory, 5000);

        // ESC để đóng
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeHistory();
            }
        });

        // Load khi mở trang
        loadHistory();
    </script>
</body>
</html>
