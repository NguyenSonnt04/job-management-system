<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử Chat - AI Assistant</title>
    <link rel="stylesheet" href="chatbot-history.css">
</head>
<body>
    <div class="history-container">
        <div class="history-header">
            <h2>Lịch sử chat</h2>
            <button class="history-close" onclick="closeHistory()">✕</button>
        </div>

        <div class="history-list" id="historyList">
            <!-- Dynamic content -->
        </div>
    </div>

    <script>
        // Nhận userId từ parent (vì iframe có localStorage riêng)
        let receivedUserId = null;
        let lastReceivedUserId = null; // Để detect userId thay đổi

        // Lắng nghe message từ parent
        window.addEventListener('message', function(event) {
            if (event.data.action === 'setUserId') {
                const newUserId = event.data.userId;
                console.log('History: Received userId from parent:', newUserId);

                // Nếu userId thay đổi, reset cache
                if (newUserId !== lastReceivedUserId) {
                    receivedUserId = newUserId;
                    lastReceivedUserId = newUserId;
                    cachedHistory = null; // Reset cache
                    console.log('History: UserId changed, reloading...');
                    // Reload history khi nhận userId mới
                    loadHistory();
                }
            }
            if (event.data.action === 'reloadHistory') {
                loadHistory();
            }
            if (event.data.action === 'historyData') {
                // Nhận history data từ parent và hiển thị
                displayHistory(event.data.history);
            }
        });

        // Get user ID - ưu tiên userId từ parent
        async function getUserId() {
            if (receivedUserId) {
                return receivedUserId;
            }

            // Fallback: lấy từ localStorage của iframe (hoặc gọi API)
            let userId = localStorage.getItem('chatbot_user_id');
            if (!userId) {
                try {
                    const response = await fetch('/api/user/me', { credentials: 'include' });
                    const data = await response.json();
                    userId = data.authenticated && data.id ? 'user_' + data.id : 'guest_' + Date.now();
                } catch {
                    userId = 'guest_' + Date.now();
                }
                localStorage.setItem('chatbot_user_id', userId);
            }
            return userId;
        }

        function getHistoryKey(userId) {
            return 'chatbot_history_' + userId;
        }
        async function getUserId() {
            let userId = localStorage.getItem('chatbot_user_id');

            if (!userId) {
                try {
                    const response = await fetch('/api/user/me', { credentials: 'include' });
                    const data = await response.json();
                    userId = data.authenticated && data.id ? 'user_' + data.id : 'guest_' + Date.now();
                } catch {
                    userId = 'guest_' + Date.now();
                }
                localStorage.setItem('chatbot_user_id', userId);
            }

            return userId;
        }

        function getHistoryKey(userId) {
            return 'chatbot_history_' + userId;
        }

        // Cache history để tránh request liên tục
        let cachedHistory = null;

        async function loadHistory() {
            const list = document.getElementById('historyList');
            const userId = await getUserId();

            // Gửi message đến parent để request history
            if (window.parent !== window) {
                window.parent.postMessage({
                    action: 'loadHistory',
                    userId: userId
                }, '*');
            }
        }

        // Xử lý khi nhận history data từ parent
        function displayHistory(history) {
            const list = document.getElementById('historyList');
            if (!list) return;

            // Cache history để export dùng
            cachedHistory = history;

            if (history.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <p>Chưa có lịch sử chat</p>
                        <small>Bắt đầu chat với AI Assistant ngay!</small>
                    </div>
                `;
            } else {
                list.innerHTML = history.map(item => `
                    <div class="history-item" onclick="copyToClipboard('${escapeHtml(item.answer)}')">
                        <div class="history-question">Q: ${escapeHtml(item.question)}</div>
                        <div class="history-answer">A: ${escapeHtml(item.answer)}</div>
                        <div class="history-time">${new Date(item.timestamp).toLocaleString('vi-VN')}</div>
                    </div>
                `).reverse().join('');
            }
        }

        function getHistory(historyKey) {
            try {
                const history = localStorage.getItem(historyKey);
                return history ? JSON.parse(history) : [];
            } catch (e) {
                console.error('Error loading chat history:', e);
                return [];
            }
        }

        function closeHistory() {
            // Gửi message về parent window để đóng
            if (window.parent !== window) {
                window.parent.postMessage({ action: 'closeHistory' }, '*');
            }
            window.close();
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                // Hiển thị thông báo nhỏ
                const tooltip = document.createElement('div');
                tooltip.textContent = '✓ Đã copy!';
                tooltip.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    background: #10b981;
                    color: white;
                    padding: 8px 16px;
                    border-radius: 8px;
                    font-size: 12px;
                    z-index: 10000;
                    animation: fadeOut 2s forwards;
                `;
                document.body.appendChild(tooltip);
                setTimeout(() => tooltip.remove(), 2000);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Auto refresh mỗi 5 giây
        setInterval(loadHistory, 5000);

        // ESC để đóng
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeHistory();
            }
        });

        // Load khi mở trang
        loadHistory();
    </script>
</body>
</html>
