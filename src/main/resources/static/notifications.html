<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông báo | CoHoiViecLam</title>
    <meta name="description" content="Xem và quản lý thông báo của bạn trên CoHoiViecLam.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; font-size: 13px; color: #1e293b; background: #f8fafc; }

        .notif-container {
            max-width: 960px;
            margin: 24px auto 60px;
            padding: 0 24px;
        }

        .notif-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .notif-header h1 {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
        }
        .notif-header .unread-count {
            font-size: 12px;
            font-weight: 500;
            color: #64748b;
            margin-left: 8px;
        }

        .btn-mark-all {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            color: #3b82f6;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 6px;
            cursor: pointer;
            transition: background .15s, color .15s;
        }
        .btn-mark-all:hover { background: #dbeafe; color: #2563eb; }
        .btn-mark-all:disabled { opacity: .4; cursor: default; }
        .btn-mark-all svg { width: 14px; height: 14px; }

        .notif-list {
            background: #fff;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            overflow: hidden;
        }

        .notif-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 14px;
            border-bottom: 1px solid #cbd5e1;
            cursor: pointer;
            transition: background .12s;
            text-decoration: none;
            color: inherit;
        }
        .notif-item:last-child { border-bottom: none; }
        .notif-item:hover { background: #f1f5f9; }
        .notif-item.unread { background: #f0f7ff; }
        .notif-item.unread:hover { background: #e0efff; }

        .notif-dot {
            flex-shrink: 0;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 5px;
            background: transparent;
        }
        .notif-item.unread .notif-dot { background: #3b82f6; }

        .notif-body { flex: 1; min-width: 0; }
        .notif-title {
            font-size: 13px;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 2px;
            line-height: 1.4;
        }
        .notif-item.unread .notif-title { color: #1d4ed8; }

        .notif-message {
            font-size: 12px;
            color: #475569;
            line-height: 1.45;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .notif-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            color: #94a3b8;
        }
        .notif-meta .job-link {
            color: #3b82f6;
            font-weight: 500;
        }

        .notif-type-icon {
            flex-shrink: 0;
            width: 30px;
            height: 30px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .notif-type-icon svg { width: 16px; height: 16px; }
        .notif-type-icon.type-application { background: #eff6ff; color: #3b82f6; }
        .notif-type-icon.type-interview { background: #f0fdf4; color: #16a34a; }
        .notif-type-icon.type-status { background: #fefce8; color: #ca8a04; }
        .notif-type-icon.type-system { background: #f1f5f9; color: #64748b; }
        .notif-type-icon.type-default { background: #f1f5f9; color: #64748b; }

        .notif-empty {
            text-align: center;
            padding: 48px 16px;
            color: #94a3b8;
        }
        .notif-empty svg {
            width: 40px;
            height: 40px;
            margin-bottom: 12px;
            opacity: .5;
        }
        .notif-empty p {
            font-size: 13px;
            font-weight: 500;
        }

        .notif-loading {
            text-align: center;
            padding: 48px 16px;
            color: #94a3b8;
            font-size: 13px;
        }

        .notif-error {
            text-align: center;
            padding: 32px 16px;
            color: #ef4444;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="notif-container">
        <div class="notif-header">
            <div style="display:flex;align-items:center;">
                <h1>Thông báo</h1>
                <span class="unread-count" id="unreadBadge"></span>
            </div>
            <button class="btn-mark-all" id="btnMarkAll" style="display:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                Đánh dấu tất cả đã đọc
            </button>
        </div>

        <div class="notif-list" id="notifList">
            <div class="notif-loading">Đang tải thông báo...</div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
    (function() {
        const listEl   = document.getElementById('notifList');
        const badgeEl  = document.getElementById('unreadBadge');
        const btnAll   = document.getElementById('btnMarkAll');

        let notifications = [];

        function timeAgo(dateStr) {
            if (!dateStr) return '';
            const diff = Date.now() - new Date(dateStr).getTime();
            const sec  = Math.floor(diff / 1000);
            if (sec < 60)   return 'Vừa xong';
            const min = Math.floor(sec / 60);
            if (min < 60)   return min + ' phút trước';
            const hr = Math.floor(min / 60);
            if (hr < 24)    return hr + ' giờ trước';
            const day = Math.floor(hr / 24);
            if (day < 30)   return day + ' ngày trước';
            const month = Math.floor(day / 30);
            if (month < 12) return month + ' tháng trước';
            return Math.floor(month / 12) + ' năm trước';
        }

        function typeIconClass(type) {
            const t = (type || '').toLowerCase();
            if (t.includes('application') || t.includes('apply'))    return 'type-application';
            if (t.includes('interview'))                              return 'type-interview';
            if (t.includes('status') || t.includes('accept') || t.includes('reject')) return 'type-status';
            if (t.includes('system'))                                 return 'type-system';
            return 'type-default';
        }

        function typeIconSvg(type) {
            const t = (type || '').toLowerCase();
            if (t.includes('application') || t.includes('apply'))
                return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
            if (t.includes('interview'))
                return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';
            if (t.includes('status') || t.includes('accept') || t.includes('reject'))
                return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
            return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>';
        }

        function render() {
            const unread = notifications.filter(n => !n.read).length;
            badgeEl.textContent = unread > 0 ? '(' + unread + ' chưa đọc)' : '';
            btnAll.style.display = unread > 0 ? 'inline-flex' : 'none';

            if (notifications.length === 0) {
                listEl.innerHTML =
                    '<div class="notif-empty">' +
                        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
                            '<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>' +
                            '<path d="M13.73 21a2 2 0 0 1-3.46 0"/>' +
                        '</svg>' +
                        '<p>Chưa có thông báo nào</p>' +
                    '</div>';
                return;
            }

            listEl.innerHTML = notifications.map(function(n) {
                var cls = 'notif-item' + (n.read ? '' : ' unread');
                var jobMeta = n.jobId && n.jobTitle
                    ? '<span class="job-link">' + escHtml(n.jobTitle) + '</span>'
                    : '';
                return '<div class="' + cls + '" data-id="' + n.id + '" data-job-id="' + (n.jobId || '') + '">' +
                    '<div class="notif-type-icon ' + typeIconClass(n.type) + '">' + typeIconSvg(n.type) + '</div>' +
                    '<div class="notif-body">' +
                        '<div class="notif-title">' + escHtml(n.title) + '</div>' +
                        '<div class="notif-message">' + escHtml(n.message) + '</div>' +
                        '<div class="notif-meta">' +
                            '<span>' + timeAgo(n.createdAt) + '</span>' +
                            jobMeta +
                        '</div>' +
                    '</div>' +
                    '<span class="notif-dot"></span>' +
                '</div>';
            }).join('');

            listEl.querySelectorAll('.notif-item').forEach(function(el) {
                el.addEventListener('click', function() {
                    var id    = el.dataset.id;
                    var jobId = el.dataset.jobId;
                    markRead(id, function() {
                        if (jobId) {
                            window.location.href = '/job-detail.html?id=' + jobId;
                        }
                    });
                });
            });
        }

        function escHtml(str) {
            if (!str) return '';
            var d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function fetchNotifications() {
            fetch('/api/notifications', { credentials: 'include' })
                .then(function(r) {
                    if (r.status === 401) {
                        listEl.innerHTML = '<div class="notif-error">Vui lòng <a href="/employer-login.html" style="color:#3b82f6;">đăng nhập</a> để xem thông báo.</div>';
                        throw new Error('unauthorized');
                    }
                    return r.json();
                })
                .then(function(data) {
                    notifications = data.notifications || [];
                    render();
                })
                .catch(function(e) {
                    if (e.message !== 'unauthorized') {
                        listEl.innerHTML = '<div class="notif-error">Không thể tải thông báo. Vui lòng thử lại.</div>';
                    }
                });
        }

        function markRead(id, cb) {
            var n = notifications.find(function(x) { return String(x.id) === String(id); });
            if (n) n.read = true;
            render();
            fetch('/api/notifications/' + id + '/read', {
                method: 'PATCH',
                credentials: 'include'
            }).then(function() {
                if (cb) cb();
            }).catch(function() {
                if (cb) cb();
            });
        }

        function markAllRead() {
            notifications.forEach(function(n) { n.read = true; });
            render();
            btnAll.disabled = true;
            fetch('/api/notifications/read-all', {
                method: 'PATCH',
                credentials: 'include'
            }).then(function() {
                btnAll.disabled = false;
            }).catch(function() {
                btnAll.disabled = false;
            });
        }

        btnAll.addEventListener('click', markAllRead);
        fetchNotifications();
    })();
    </script>
    <div id="footer-placeholder"></div>
</body>
</html>
