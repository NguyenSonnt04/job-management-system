<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CV Builder | CareerViet</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cv-editor.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ── Progress steps ── */
        .cv-progress {
            display: flex; align-items: center; gap: 6px;
            padding: 10px 16px; background: #f8fafc;
            border-bottom: 1px solid #e8ecef; overflow-x: auto;
        }
        .cv-step {
            display: flex; align-items: center; gap: 4px;
            font-size: 11px; font-weight: 600; color: #94a3b8;
            white-space: nowrap;
        }
        .cv-step.done  { color: #10b981; }
        .cv-step.active { color: #2e3b8e; }
        .cv-step-dot {
            width: 20px; height: 20px; border-radius: 50%; border: 2px solid #e2e8f0;
            display: flex; align-items: center; justify-content: center; font-size: 9px;
        }
        .cv-step.done  .cv-step-dot { background: #10b981; border-color: #10b981; color: white; }
        .cv-step.active .cv-step-dot { background: #2e3b8e; border-color: #2e3b8e; color: white; }
        .cv-step-line { flex: 1; height: 2px; background: #e2e8f0; min-width: 12px; }
        .cv-step-line.done { background: #10b981; }

        /* ── Quick-reply chips ── */
        .quick-replies {
            display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px 0;
        }
        .quick-reply {
            padding: 5px 12px; background: #eff6ff; color: #2e3b8e;
            border: 1px solid #bfdbfe; border-radius: 20px;
            font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s;
        }
        .quick-reply:hover { background: #2e3b8e; color: white; }

        /* ── Generating overlay ── */
        .generating-overlay {
            display: none; position: absolute; inset: 0;
            background: rgba(255,255,255,0.9); z-index: 50;
            align-items: center; justify-content: center; flex-direction: column;
            gap: 16px; font-size: 15px; font-weight: 600; color: #2e3b8e;
        }
        .generating-overlay.show { display: flex; }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #e2e8f0;
            border-top-color: #2e3b8e; border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── CV Action Toolbar ── */
        .cv-action-toolbar {
            display: none; align-items: center; justify-content: center; gap: 10px;
            padding: 12px 20px; background: #f8fafc;
            border-top: 1px solid #e8ecef; flex-wrap: wrap;
        }
        .cv-action-toolbar.show { display: flex; }
        .btn-cv-action {
            display: flex; align-items: center; gap: 6px;
            padding: 9px 18px; border-radius: 8px; border: none;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-save-cv  { background: #2e3b8e; color: white; }
        .btn-save-cv:hover { background: #1e2a6e; }
        .btn-pdf { background: #dc2626; color: white; }
        .btn-pdf:hover { background: #b91c1c; }
        .btn-save-cv.saved { background: #10b981; }
        .btn-upload-avatar { background: #0f766e; color: white; }
        .btn-upload-avatar:hover { background: #0d6361; }
        .btn-edit-toggle { background: white; color: #2e3b8e; border: 2px solid #2e3b8e; }
        .btn-edit-toggle.active { background: #2e3b8e; color: white; }
        .btn-my-cvs { background: #7c3aed; color: white; }
        .btn-my-cvs:hover { background: #6d28d9; }

        /* ── Save Name Modal ── */
        .cv-modal-backdrop {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.45); z-index: 9000;
            align-items: center; justify-content: center;
        }
        .cv-modal-backdrop.show { display: flex; }
        .cv-modal {
            background: white; border-radius: 16px;
            padding: 32px; width: 420px; max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            animation: modalIn 0.22s ease;
        }
        @keyframes modalIn { from { opacity:0; transform:scale(0.94) translateY(-12px); } to { opacity:1; transform:none; } }
        .cv-modal h3 { font-size: 18px; font-weight: 800; color: #1e293b; margin: 0 0 6px; }
        .cv-modal p { font-size: 13px; color: #64748b; margin: 0 0 20px; }
        .cv-modal input {
            width: 100%; padding: 11px 14px; border-radius: 8px;
            border: 2px solid #e2e8f0; font-size: 14px;
            box-sizing: border-box; outline: none; transition: border 0.15s;
        }
        .cv-modal input:focus { border-color: #2e3b8e; }
        .cv-modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
        .cv-modal-actions button { padding: 10px 20px; border-radius: 8px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
        .btn-modal-cancel { background: #f1f5f9; color: #475569; }
        .btn-modal-cancel:hover { background: #e2e8f0; }
        .btn-modal-confirm { background: #2e3b8e; color: white; }
        .btn-modal-confirm:hover { background: #1e2a6e; }

        /* ── Inline editing glow ── */
        .cv-editable-mode [contenteditable] {
            outline: none;
            border-bottom: 1px dashed rgba(46,59,142,0.35);
            min-width: 20px; display: inline-block;
            cursor: text;
            transition: background 0.15s;
        }
        .cv-editable-mode [contenteditable]:hover {
            background: rgba(46,59,142,0.06);
            border-radius: 2px;
        }
        .cv-editable-mode [contenteditable]:focus {
            background: rgba(46,59,142,0.08);
            border-color: #2e3b8e;
            border-radius: 2px;
        }
        .edit-mode-badge {
            display: none; position: fixed; bottom: 80px; right: 20px;
            background: #2e3b8e; color: white; border-radius: 8px;
            padding: 6px 14px; font-size: 12px; font-weight: 700;
            z-index: 200; box-shadow: 0 4px 12px rgba(46,59,142,0.35);
            animation: fadeIn 0.3s;
        }
        .edit-mode-badge.show { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* ── Avatar upload overlay ── */
        .cvm-avatar-wrapper {
            position: relative;
            width: 120px; height: 120px;
            flex-shrink: 0;
        }
        .cvm-avatar-wrapper .cvm-avatar {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .avatar-upload-overlay {
            display: none;
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.45);
            border-radius: 50%;
            align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 22px;
            transition: opacity 0.2s;
        }
        .cv-editable-mode .cvm-avatar-wrapper:hover .avatar-upload-overlay {
            display: flex;
        }
        #avatarFileInput { display: none; }

        /* ── Print (PDF export) ── */
        @page {
            size: A4;
            margin: 0;
        }
        @media print {
            #header-placeholder, #footer-placeholder,
            .assistant-column, .cv-progress, .generating-overlay,
            #templateBanner, .cv-action-toolbar, .edit-mode-badge { display: none !important; }
            body { background: white !important; overflow: visible !important; }
            .editor-workspace { display: block !important; overflow: visible !important; height: auto !important; }
            .preview-column {
                margin: 0 !important; padding: 0 !important;
                box-shadow: none !important; border: none !important;
                height: auto !important; overflow: visible !important;
                background: white !important;
            }
            .cv-document {
                box-shadow: none !important; transform: none !important;
                border-radius: 0 !important; padding: 0 !important;
                max-width: none !important; min-height: unset !important;
                width: 210mm !important;
            }
            .cvm-header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .cvm-left { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .cvm-bar-fill { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .cvm-exp-item { page-break-inside: avoid; }
            .cvm-section { page-break-inside: avoid; }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="editor-workspace">
        <!-- ── Left: CV Preview ── -->
        <section class="preview-column" style="position:relative;">
            <!-- Generating overlay -->
            <div class="generating-overlay" id="generatingOverlay">
                <div class="spinner"></div>
                <span>AI đang tạo CV của bạn...</span>
                <small style="color:#64748b; font-weight:400;">Đây có thể mất 10–20 giây</small>
            </div>

            <div class="cv-document" id="cvPreview">
                <div id="cvPlaceholder" style="text-align:center; padding:60px 20px; color:#94a3b8;">
                    <div style="font-size:48px; margin-bottom:16px;">✨</div>
                    <p style="font-size:16px; font-weight:700; color:#64748b; margin-bottom:8px;">CV của bạn sẽ hiện ra ở đây</p>
                    <p style="font-size:13px;">Hoàn thành trò chuyện với AI bên phải<br>để tạo CV theo mẫu bạn đã chọn</p>
                </div>
            </div>

            <!-- CV Action Toolbar: shown after CV is generated -->
            <div class="cv-action-toolbar" id="cvToolbar">
                <button class="btn-cv-action btn-upload-avatar" onclick="triggerAvatarUpload()" title="Tải ảnh đại diện">
                    🖼️ Ảnh
                </button>
                <button class="btn-cv-action btn-edit-toggle" id="btnEditToggle" onclick="toggleEditMode()" title="Chỉnh sửa trực tiếp">
                    ✏️ Chỉnh sửa
                </button>
                <button class="btn-cv-action btn-save-cv" id="btnSaveCv" onclick="openSaveModal()">
                    💾 Lưu CV
                </button>
                <button class="btn-cv-action btn-pdf" onclick="downloadPdf()">
                    📄 Tải PDF
                </button>
                <button class="btn-cv-action btn-my-cvs" onclick="window.location.href='/my-cvs.html'">
                    📂 CV của tôi
                </button>
            </div>
            <!-- Hidden avatar input -->
            <input type="file" id="avatarFileInput" accept="image/*" onchange="handleAvatarUpload(event)">

            <!-- Save Name Modal -->
            <div class="cv-modal-backdrop" id="saveModal">
                <div class="cv-modal">
                    <h3>💾 Lưu CV</h3>
                    <p>Đặt tên để dễ nhận biết CV này sau này</p>
                    <input type="text" id="cvNameInput" placeholder="VD: CV Software Engineer 2024" maxlength="100">
                    <div class="cv-modal-actions">
                        <button class="btn-modal-cancel" onclick="closeSaveModal()">Hủy</button>
                        <button class="btn-modal-confirm" id="btnConfirmSave" onclick="confirmSave()">Lưu ngay</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- ── Right: AI Chat ── -->
        <aside class="assistant-column">
            <!-- Header -->
            <header class="assistant-header">
                <div class="assistant-info">
                    <div class="ai-icon">
                        <i data-lucide="bot"></i>
                    </div>
                    <div>
                        <div class="ai-name">AI CV Assistant</div>
                        <div class="ai-status" id="aiStatus">Đang trực tuyến &amp; sẵn sàng hỗ trợ</div>
                    </div>
                </div>
                <button id="btnRestart" title="Bắt đầu lại"
                    style="background:none;border:none;cursor:pointer;color:#94a3b8;font-size:20px;"
                    onclick="restartChat()">↺</button>
            </header>

            <!-- Progress steps -->
            <div class="cv-progress" id="progressBar"></div>

            <!-- Chat history -->
            <div class="chat-history" id="chatHistory"></div>

            <!-- Quick reply chips -->
            <div class="quick-replies" id="quickReplies"></div>

            <!-- Input -->
            <div class="chat-actions">
                <div class="input-container">
                    <textarea class="chat-input" id="chatInput"
                        placeholder="Nhập câu trả lời của bạn..." rows="3"></textarea>
                    <div class="input-footer">
                        <span class="input-hint" id="inputHint"></span>
                        <div class="input-btns">
                            <div class="btn-send" id="btnSend">
                                <i data-lucide="send" style="width:16px;"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div style="text-align:right; margin-top:6px;">
                    <span style="font-size:0.65rem; color:#10b981; font-weight:600;" id="aiReadyLabel">
                        ● AI Sẵn sàng
                    </span>
                </div>
            </div>
        </aside>
    </div>

    <div id="footer-placeholder"></div>
    <!-- Edit mode floating badge -->
    <div class="edit-mode-badge" id="editModeBadge">✏️ Đang chỉnh sửa trực tiếp</div>
    <script src="js/main.js"></script>
    <script>
    // ═══════════════════════════════════════════════════════════
    //  CONSTANTS & STATE
    // ═══════════════════════════════════════════════════════════

    const STEPS = [
        { id: 'name',       label: 'Tên',         question: 'Xin chào! Bạn cho tôi biết <strong>họ và tên đầy đủ</strong> của bạn nhé?', hint: 'VD: Nguyễn Văn A', required: true },
        { id: 'subtitle',   label: 'Chức danh',   question: 'Tuyệt! Bạn đang làm nghề gì hoặc <strong>chức danh / mục tiêu nghề nghiệp</strong> của bạn là gì?', hint: 'VD: Software Engineer, Bác sĩ, Kế toán trưởng, Kiến trúc sư...' },
        { id: 'contact',    label: 'Liên hệ',     question: 'Cho tôi biết <strong>email, số điện thoại, địa chỉ</strong> của bạn. Nếu có, thêm cả link <strong>LinkedIn hoặc Portfolio</strong>?', hint: 'Email\nSố điện thoại\nĐịa chỉ\nLinkedIn/Portfolio (tùy chọn)', multi: true },
        { id: 'summary',    label: 'Bản thân',    question: 'Hãy <strong>giới thiệu về bản thân</strong> bạn — kinh nghiệm nổi bật, điểm mạnh và mục tiêu nghề nghiệp?', hint: 'Viết 2-5 câu mô tả bản thân...' },
        { id: 'edu',        label: 'Học vấn',     question: 'Bạn học ở đâu? Hãy cho biết <strong>tên trường, ngành học, bằng cấp và thời gian</strong>?', hint: 'VD: ĐH Y Hà Nội, Bác sĩ đa khoa, Y6, 2016-2022', loop: true, loopLabel: 'bằng cấp / trường học' },
        { id: 'exp',        label: 'Kinh nghiệm', question: 'Bạn đã có <strong>kinh nghiệm làm việc</strong> chưa? Nếu có, hãy cho biết công ty/cơ quan, vị trí, thời gian và mô tả ngắn công việc?', hint: 'VD: Bệnh viện Bạch Mai, BS nội trú, 2022-2024', loop: true, loopLabel: 'kinh nghiệm', optional: true },
        { id: 'projects',   label: 'Dự án',       question: 'Bạn có <strong>dự án, công trình hoặc thành tích nổi bật</strong> nào muốn đưa vào CV không?', hint: 'VD: Đề tài nghiên cứu, App, Chiến dịch Marketing, Thiết kế kiến trúc...', loop: true, loopLabel: 'dự án / công trình', optional: true },
        { id: 'skills',     label: 'Kỹ năng',     question: 'Hãy liệt kê <strong>kỹ năng chuyên môn và kỹ năng mềm</strong> của bạn theo từng nhóm?', hint: 'VD: Chuyên môn: Phẫu thuật, Cấp cứu\nNgôn ngữ: Tiếng Anh C1\nTin học: Word, Excel' },
        { id: 'certs',      label: 'Chứng chỉ',   question: 'Bạn có <strong>chứng chỉ hành nghề, chứng chỉ chuyên môn, hay bằng cấp bổ sung</strong> nào không?', hint: 'VD: Chứng chỉ hành nghề dược, IELTS 7.0, CFA Level 1, PMP...', loop: true, loopLabel: 'chứng chỉ', optional: true },
        { id: 'awards',     label: 'Giải thưởng', question: 'Bạn đã từng nhận được <strong>giải thưởng, danh hiệu hay thành tích xuất sắc</strong> nào không?', hint: 'VD: Nhân viên xuất sắc năm 2023, Học bổng Honda, Giải nhất Hackathon...', loop: true, loopLabel: 'giải thưởng', optional: true },
        { id: 'activities', label: 'Hoạt động',   question: 'Bạn có tham gia <strong>hoạt động ngoại khóa, tình nguyện, câu lạc bộ hoặc tổ chức</strong> nào không?', hint: 'VD: CLB Bóng đá, Tình nguyện Mùa hè xanh, Ban chấp hành Đoàn trường...', loop: true, loopLabel: 'hoạt động', optional: true },
        { id: 'done',       label: 'Hoàn tất',    question: '' }
    ];

    let currentStepIndex = 0;
    let loopingStep = null;       // which step we're re-collecting
    let loopCount   = 0;          // how many items collected in current loop
    let templateData = null;      // from admin-configured template JSON
    let templateName = '';

    // Raw collected data
    const cvData = {
        name: '', subtitle: '', email: '', phone: '', address: '',
        linkedin: '', portfolio: '', summary: '',
        education: [], experience: [], projects: [], skills: [],
        certifications: [], awards: [], activities: []
    };

    // Avatar stored as data URL
    let avatarDataUrl = null;

    // Inline edit mode flag
    let isEditMode = false;

    // ═══════════════════════════════════════════════════════════
    //  INIT
    // ═══════════════════════════════════════════════════════════
    async function init() {
        lucide.createIcons();

        const params = new URLSearchParams(window.location.search);
        const templateId = params.get('template');

        if (templateId) {
            try {
                const res = await fetch(`/api/cv-templates/${templateId}`);
                if (res.ok) {
                    const tpl = await res.json();
                    templateName = tpl.name || 'CV Mẫu';
                    // Store template metadata globally for style routing
                    window.currentTemplate = {
                        previewColor: tpl.previewColor || '#2E3B8E',
                        styleTag:     tpl.styleTag     || 'professional',
                        name:         tpl.name         || ''
                    };
                    if (tpl.templateContent) {
                        try { templateData = JSON.parse(tpl.templateContent); } catch {}
                    }
                }
            } catch {}
        }

        // ── Render template preview immediately ──────────────────
        if (templateData && templateData.name) {
            // Show the template sample data right away
            renderCvPreview(templateData);
            // Add an overlay banner indicating this is the template preview
            const banner = document.createElement('div');
            banner.id = 'templateBanner';
            banner.style.cssText = `
                position: sticky; top: 0; z-index: 10;
                background: linear-gradient(135deg, #2e3b8e, #1a2456);
                color: white; text-align: center; padding: 10px 16px;
                font-size: 13px; font-weight: 600; letter-spacing: 0.3px;
            `;
            banner.innerHTML = `📋 Đây là mẫu CV <strong>"${esc(templateName)}"</strong> — Hoàn thành chat bên phải để điền thông tin của bạn`;
            document.getElementById('cvPreview').before(banner);
        }

        renderProgress();
        startConversation();

        document.getElementById('btnSend').addEventListener('click', handleSend);
        document.getElementById('chatInput').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
        });
    }

    // ═══════════════════════════════════════════════════════════
    //  PROGRESS BAR
    // ═══════════════════════════════════════════════════════════
    function renderProgress() {
        const bar = document.getElementById('progressBar');
        const visibleSteps = STEPS.filter(s => s.id !== 'done');
        bar.innerHTML = visibleSteps.map((s, i) => {
            const realIdx = STEPS.indexOf(s);
            const isDone   = realIdx < currentStepIndex;
            const isActive = realIdx === currentStepIndex;
            return `
                ${i > 0 ? `<div class="cv-step-line ${isDone ? 'done' : ''}"></div>` : ''}
                <div class="cv-step ${isDone ? 'done' : ''} ${isActive ? 'active' : ''}">
                    <div class="cv-step-dot">${isDone ? '✓' : i + 1}</div>
                    <span>${s.label}</span>
                </div>`;
        }).join('');
    }

    // ═══════════════════════════════════════════════════════════
    //  CONVERSATION START
    // ═══════════════════════════════════════════════════════════
    function startConversation() {
        const greeting = templateName
            ? `Xin chào! Tôi sẽ giúp bạn tạo CV theo mẫu <strong>"${esc(templateName)}"</strong>. Hãy trả lời từng câu hỏi để tôi điền thông tin cho bạn nhé! 🎯`
            : 'Xin chào! Tôi là AI CV Assistant. Hãy trả lời từng câu hỏi để tôi tạo CV chuyên nghiệp cho bạn! 🎯';

        addAiMsg(greeting);
        setTimeout(() => askCurrentStep(), 600);
    }

    // ═══════════════════════════════════════════════════════════
    //  STEP HANDLER
    // ═══════════════════════════════════════════════════════════
    function askCurrentStep() {
        const step = STEPS[currentStepIndex];
        if (!step || step.id === 'done') { generateCv(); return; }

        document.getElementById('inputHint').textContent = step.hint || '';
        renderProgress();

        let q = step.question;

        // For loop steps on second+ iteration, ask if more
        if (loopingStep && loopingStep.id === step.id && loopCount > 0) {
            q = `Bạn có muốn thêm <strong>${step.loopLabel}</strong> khác không? (Nhập nội dung hoặc bỏ qua)`;
            setQuickReplies(['Không, tiếp tục ➜']);
        } else {
            clearQuickReplies();
            if (step.optional) {
                setQuickReplies(['Bỏ qua phần này ➜']);
            }
        }

        addAiMsg(q);
    }

    // ═══════════════════════════════════════════════════════════
    //  SEND HANDLER
    // ═══════════════════════════════════════════════════════════
    async function handleSend() {
        const input = document.getElementById('chatInput');
        const text  = input.value.trim();
        if (!text) return;

        input.value = '';
        addUserMsg(text);
        clearQuickReplies();

        // ── Post-gen mode: route to AI edit ──────────────────────
        if (isPostGenMode) {
            await handleEditRequest(text);
            return;
        }

        setAiTyping(true);

        const step = STEPS[currentStepIndex];

        // Special: skip optional
        if (text.toLowerCase().includes('bỏ qua') || text.toLowerCase().includes('tiếp tục ➜') && loopCount === 0) {
            setAiTyping(false);
            moveToNextStep();
            return;
        }

        // Special: done with loop
        if ((text.toLowerCase().startsWith('không') || text.includes('tiếp tục ➜')) && loopCount > 0) {
            setAiTyping(false);
            addAiMsg('OK! Chuyển sang phần tiếp theo nhé. 😊');
            loopingStep = null;
            loopCount   = 0;
            currentStepIndex++;
            setTimeout(() => askCurrentStep(), 500);
            return;
        }

        // Collect the data
        collectData(step, text);

        // Ask Gemini to acknowledge
        let ackMsg = 'Đã ghi nhận! ';
        try {
            const res = await fetch('/api/cv-ai/acknowledge', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ step: step.label, answer: text })
            });
            if (res.ok) {
                const data = await res.json();
                ackMsg = data.message || ackMsg;
            }
        } catch {}

        setAiTyping(false);
        addAiMsg(ackMsg);

        // Move forward
        setTimeout(() => {
            if (step.loop) {
                loopingStep = step;
                loopCount++;
                // Ask next iteration of same step
                setTimeout(() => askCurrentStep(), 400);
            } else {
                moveToNextStep();
            }
        }, 400);
    }

    function moveToNextStep() {
        loopingStep = null;
        loopCount   = 0;
        currentStepIndex++;
        setTimeout(() => askCurrentStep(), 500);
    }

    // ═══════════════════════════════════════════════════════════
    //  DATA COLLECTOR
    // ═══════════════════════════════════════════════════════════
    function collectData(step, text) {
        switch (step.id) {
            case 'name':
                cvData.name = text;
                break;

            case 'subtitle':
                cvData.subtitle = text;
                break;

            case 'contact': {
                const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
                const emailLine  = lines.find(l => l.includes('@'));
                const phoneLine  = lines.find(l => /[\d\s\-\+]{8,}/.test(l) && !l.includes('@'));
                const linkedinLine = lines.find(l => /linkedin\.com|linkedin:/i.test(l));
                const portfolioLine = lines.find(l => /portfolio|github\.com|behance|dribbble|http/i.test(l) && l !== linkedinLine);
                const rest = lines.filter(l => l !== emailLine && l !== phoneLine && l !== linkedinLine && l !== portfolioLine);
                if (emailLine)   cvData.email     = emailLine.replace(/^email:?\s*/i, '');
                if (phoneLine)   cvData.phone     = phoneLine.replace(/^(phone|sdt|điện thoại):?\s*/i, '');
                if (linkedinLine) cvData.linkedin  = linkedinLine.replace(/^linkedin:?\s*/i, '').trim();
                if (portfolioLine) cvData.portfolio = portfolioLine.replace(/^(portfolio|github|link):?\s*/i, '').trim();
                if (rest.length) cvData.address   = rest.join(', ');
                break;
            }

            case 'summary':
                cvData.summary = text;
                break;

            case 'edu':
                cvData.education.push({ raw: text });
                break;

            case 'exp':
                cvData.experience.push({ raw: text });
                break;

            case 'projects':
                cvData.projects.push({ raw: text });
                break;

            case 'certs':
                cvData.certifications.push({ raw: text });
                break;

            case 'awards':
                cvData.awards.push({ raw: text });
                break;

            case 'activities':
                cvData.activities.push({ raw: text });
                break;

            case 'skills':
                text.split('\n').forEach(line => {
                    const colonIdx = line.indexOf(':');
                    if (colonIdx !== -1) {
                        const cat   = line.substring(0, colonIdx).trim();
                        const items = line.substring(colonIdx + 1).split(',').map(s => s.trim()).filter(Boolean);
                        if (items.length) cvData.skills.push({ category: cat, items });
                    } else if (line.trim()) {
                        const items = line.split(',').map(s => s.trim()).filter(Boolean);
                        if (cvData.skills.length && cvData.skills[cvData.skills.length - 1].category === 'Khác') {
                            cvData.skills[cvData.skills.length - 1].items.push(...items);
                        } else {
                            cvData.skills.push({ category: 'Khác', items });
                        }
                    }
                });
                break;
        }
    }

    // ═══════════════════════════════════════════════════════════
    //  GENERATE CV (final step)
    // ═══════════════════════════════════════════════════════════
    async function generateCv() {
        renderProgress();
        addAiMsg('🎉 Tôi đã có đủ thông tin! Để tôi tạo CV chuyên nghiệp cho bạn... <em>Quá trình này mất khoảng 10-20 giây.</em>');
        disableInput(true);

        document.getElementById('generatingOverlay').classList.add('show');

        try {
            const res = await fetch('/api/cv-ai/generate-cv', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rawData: cvData })
            });

            document.getElementById('generatingOverlay').classList.remove('show');

            if (!res.ok) throw new Error('Server error');
            const data = await res.json();

            if (!data.success || !data.cvJson) {
                throw new Error(data.error || 'AI response invalid');
            }

            renderCvPreview(data.cvJson);

            // Remove the "this is a template" banner — CV is now personalized
            const banner = document.getElementById('templateBanner');
            if (banner) banner.remove();

            addAiMsg('✅ <strong>CV của bạn đã sẵn sàng!</strong> Bạn có thể xem bên trái. Nếu muốn thay đổi gì, hãy cho tôi biết nhé!');
            enablePostGenActions();

        } catch (e) {
            document.getElementById('generatingOverlay').classList.remove('show');
            addAiMsg('😔 Có lỗi khi tạo CV: ' + e.message + '. Vui lòng thử lại hoặc kiểm tra kết nối API Key.');
            disableInput(false);
        }
    }

    function enablePostGenActions() {
        disableInput(false);
        isPostGenMode = true;
        document.getElementById('chatInput').placeholder = 'Yêu cầu chỉnh sửa CV (VD: "thêm kỹ năng Python", "viết lại summary")...';
        document.getElementById('aiStatus').textContent  = 'CV đã sẵn sàng — Hỏi tôi để chỉnh sửa';
        document.getElementById('cvToolbar').classList.add('show');
        setQuickReplies([
            'Viết lại phần tóm tắt',
            'Thêm kỹ năng vào CV',
            'Làm cho kinh nghiệm ấn tượng hơn',
            'Thêm chứng chỉ vào CV'
        ]);
    }

    // ── Toggle inline edit mode ───────────────────────────────────────────────
    function toggleEditMode() {
        isEditMode = !isEditMode;
        const preview = document.getElementById('cvPreview');
        const badge   = document.getElementById('editModeBadge');
        const btn     = document.getElementById('btnEditToggle');
        if (isEditMode) {
            preview.classList.add('cv-editable-mode');
            preview.querySelectorAll('.cv-editable').forEach(el => el.setAttribute('contenteditable', 'true'));
            btn.classList.add('active');
            btn.textContent = '✅ Đang chỉnh sửa';
            badge.classList.add('show');
            addAiMsg('✏️ <strong>Chế độ chỉnh sửa thủ công đã bật.</strong> Bạn có thể click trực tiếp vào bất kỳ đoạn văn bản nào trên CV bên trái để sửa. Nhấn nút lần nữa để tắt.');
        } else {
            preview.classList.remove('cv-editable-mode');
            preview.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
            btn.classList.remove('active');
            btn.textContent = '✏️ Chỉnh sửa thủ công';
            badge.classList.remove('show');
            addAiMsg('💾 Chỉnh sửa thủ công đã tắt. Mọi thay đổi đã được áp dụng vào CV.');
        }
    }

    // ── Avatar upload ─────────────────────────────────────────────────────────
    function triggerAvatarUpload() {
        document.getElementById('avatarFileInput').click();
    }

    function handleAvatarUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            avatarDataUrl = e.target.result;
            // Update avatar in preview if it exists
            const avatarEl = document.getElementById('cvAvatarImg');
            if (avatarEl) {
                avatarEl.src = avatarDataUrl;
                avatarEl.style.display = 'block';
                const placeholder = document.getElementById('cvAvatarPlaceholder');
                if (placeholder) placeholder.style.display = 'none';
            }
            addAiMsg('🖼️ <strong>Ảnh đại diện đã được cập nhật!</strong> Ảnh sẽ xuất hiện trong CV của bạn.');
        };
        reader.readAsDataURL(file);
    }

    // ── Post-gen: AI edit mode ────────────────────────────────────────────────
    let isPostGenMode = false;
    let currentCvJson = null;  // tracks the live generated/edited CV

    async function handleEditRequest(text) {
        if (!currentCvJson) {
            addAiMsg('Chưa có CV nào để chỉnh sửa. Vui lòng hoàn thành quá trình tạo CV trước.');
            return;
        }

        setAiTyping(true);
        disableInput(true);
        clearQuickReplies();

        try {
            const res = await fetch('/api/cv-ai/edit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ request: text, currentCv: currentCvJson })
            });

            setAiTyping(false);
            disableInput(false);

            if (!res.ok) throw new Error('Server error');
            const data = await res.json();

            if (!data.success) throw new Error(data.message || 'Lỗi chỉnh sửa');

            // Update the live CV
            currentCvJson = data.cvJson;
            renderCvPreview(data.cvJson);

            addAiMsg((data.message || 'CV đã được cập nhật! ✨') + ' Bạn có muốn thay đổi gì thêm không?');

            // Reset save button (content changed, not yet saved)
            const btnSave = document.getElementById('btnSaveCv');
            if (btnSave) {
                btnSave.textContent = '💾 Lưu CV';
                btnSave.classList.remove('saved');
            }

            setQuickReplies([
                'Tiếp tục chỉnh sửa khác',
                'Viết lại phần tóm tắt',
                'Thêm kỹ năng mới'
            ]);

        } catch (e) {
            setAiTyping(false);
            disableInput(false);
            addAiMsg('😔 Không thể chỉnh sửa: ' + e.message);
        }
    }

    // ── Save CV to DB ─────────────────────────────────────────────────────────
    let savedCvId = null;

    function openSaveModal() {
        if (!currentCvJson) { addAiMsg('Chưa có CV để lưu.'); return; }
        const defaultName = currentCvJson.name
            ? `CV của ${currentCvJson.name}`
            : 'CV của tôi';
        document.getElementById('cvNameInput').value = savedCvId ? (currentCvJson._savedName || defaultName) : defaultName;
        document.getElementById('saveModal').classList.add('show');
        setTimeout(() => document.getElementById('cvNameInput').focus(), 80);
    }

    function closeSaveModal() {
        document.getElementById('saveModal').classList.remove('show');
    }

    // Close on backdrop click
    document.getElementById('saveModal').addEventListener('click', function(e) {
        if (e.target === this) closeSaveModal();
    });

    // Enter to confirm
    document.getElementById('cvNameInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') confirmSave();
        if (e.key === 'Escape') closeSaveModal();
    });

    async function confirmSave() {
        const cvName = (document.getElementById('cvNameInput').value || '').trim()
            || (currentCvJson.name ? `CV của ${currentCvJson.name}` : 'CV của tôi');

        closeSaveModal();

        const btnSave = document.getElementById('btnSaveCv');
        btnSave.textContent = '⏳ Đang lưu...';
        btnSave.disabled = true;

        const params = new URLSearchParams(window.location.search);

        try {
            const url    = savedCvId ? `/api/user-cv/${savedCvId}` : '/api/user-cv/save';
            const method = savedCvId ? 'PUT' : 'POST';

            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    cvName,
                    templateId:   params.get('template') || null,
                    templateName: templateName || '',
                    cvContent:    JSON.stringify(currentCvJson)
                })
            });

            const data = await res.json();

            if (res.status === 401) {
                addAiMsg('⚠️ Bạn cần <strong><a href="/login.html" style="color:#2e3b8e;">đăng nhập</a></strong> để lưu CV vào tài khoản.');
                btnSave.textContent = '💾 Lưu CV';
                btnSave.disabled = false;
                return;
            }

            if (!data.success) throw new Error(data.message);

            if (data.id) { savedCvId = data.id; }
            if (currentCvJson) currentCvJson._savedName = cvName;

            btnSave.textContent = '✅ Đã lưu';
            btnSave.classList.add('saved');
            btnSave.disabled = false;
            addAiMsg(`💾 CV <strong>"${cvName}"</strong> đã được lưu thành công! <a href="/my-cvs.html" style="color:#2e3b8e;font-weight:700;">Xem CV của tôi →</a>`);

        } catch (e) {
            btnSave.textContent = '💾 Lưu CV';
            btnSave.disabled = false;
            addAiMsg('Lỗi khi lưu CV: ' + e.message);
        }
    }

    // Keep backward-compat alias
    function saveCv() { openSaveModal(); }

    // ── Download PDF ─────────────────────────────────────────────────────────
    function downloadPdf() {
        if (isEditMode) toggleEditMode();
        // Update document title temporarily for the print dialog filename
        const name = currentCvJson?.name || 'CV';
        const orig = document.title;
        document.title = `CV_${name.replace(/\s+/g, '_')}`;
        setTimeout(() => {
            window.print();
            setTimeout(() => { document.title = orig; }, 500);
        }, 150);
    }

    // ═══════════════════════════════════════════════════════════
    //  CV RENDERER — Multi-Style Dispatcher
    // ═══════════════════════════════════════════════════════════
    function renderCvPreview(c) {
        currentCvJson = c;
        const accent = window.currentTemplate?.previewColor || c._accent || '#2E3B8E';
        c._accent = accent;

        // Route to style-specific renderer based on template styleTag
        const style = window.currentTemplate?.styleTag || c._styleTag || 'professional';
        c._styleTag = style;

        let html = '';
        if (style === 'creative')    html = renderCreativeStyle(c, accent);
        else if (style === 'minimalist') html = renderMinimalistStyle(c, accent);
        else if (style === 'classic')    html = renderClassicStyle(c, accent);
        else if (style === 'harvard')    html = renderHarvardStyle(c, accent);
        else                             html = renderProfessionalStyle(c, accent);

        document.getElementById('cvPreview').innerHTML = html;

        if (isEditMode) {
            document.getElementById('cvPreview').classList.add('cv-editable-mode');
            document.getElementById('cvPreview').querySelectorAll('.cv-editable').forEach(el => el.setAttribute('contenteditable', 'true'));
        }
    }

    // ── Common helpers ──────────────────────────────────────────
    function ed(text) { return `<span class="cv-editable">${esc(text)}</span>`; }

    function getAvatarHtml(borderColor = 'rgba(255,255,255,0.6)', size = 120, shape = 'circle') {
        const existing = avatarDataUrl;
        const radius = shape === 'square' ? '12px' : '50%';
        return `<div class="cvm-avatar-wrapper" style="width:${size}px;height:${size}px;">
            <div class="cvm-avatar" id="cvAvatarPlaceholder" style="border-radius:${radius};${existing ? 'display:none;' : ''}"></div>
            <img id="cvAvatarImg" src="${existing || ''}" alt="Avatar"
                style="width:${size}px;height:${size}px;border-radius:${radius};object-fit:cover;border:4px solid ${borderColor};${existing ? '' : 'display:none;'}">
            <div class="avatar-upload-overlay" onclick="triggerAvatarUpload()" title="Thay đổi ảnh" style="border-radius:${radius};">📷</div>
        </div>`;
    }

                        <span>${ed(item)}</span>
                        <div class="cvm-bar"><div class="cvm-bar-fill" style="width:${SKILL_WIDTHS[skillWidthIdx++ % SKILL_WIDTHS.length]}%;background:${accent};"></div></div>

        const awardsHtml = (c.awards||[]).map(aw=>`
            <div class="cvm-edu-item">
                <div class="cvm-edu-degree">🏆 ${ed(aw.name||aw.raw||'')}</div>

    // ── STYLE 2: Creative (Modern Card Layout) ──────
    function renderCreativeStyle(c, accent) {
        const skillGroupsHtml = (c.skills||[]).map(sg=>`
            <div class="cvc2-skill-group">
                <div class="cvc2-skill-cat">${ed(sg.category)}</div>

                <div class="cvm2-row-period" style="color:${accent}">${esc(e.period||'')}</div>
                <div class="cvm2-row-content">
                    <div class="cvm2-row-title">${esc(e.role||'')}</div>
                    <div class="cvm2-row-org">${esc(e.company||'')}</div>
                    ${(e.details||[]).map(d=>`<div class="cvm2-bullet">${ed(d)}</div>`).join('')}
                </div>
            </div>`).join('');

        const eduHtml = (c.education||[]).map(e=>`
            <div class="cvm2-row">
                <div class="cvm2-row-period" style="color:${accent}">${esc(e.period||'')}</div>
                <div class="cvm2-row-content">
                    <div class="cvm2-row-title">${esc(e.degree||'')}</div>
                    <div class="cvm2-row-org">${esc(e.school||e.location||'')}</div>
                </div>
            </div>`).join('');

        return `<div class="cv-full cvm2-root">
            <header class="cvm2-header">
                <h1 class="cvm2-name cv-editable">${esc(c.name||'HỌ TÊN')}</h1>
                <div class="cvm2-subtitle cv-editable">${esc(c.subtitle||'')}</div>
                <div class="cvm2-contacts">
                    ${c.email?`<span>✉ ${esc(c.email)}</span>`:''}
                    ${c.phone?`<span>✆ ${esc(c.phone)}</span>`:''}
                    ${c.address?`<span>📍 ${esc(c.address)}</span>`:''}

            </header>
            <div class="cvm2-body">
                ${c.summary?block('GIỚI THIỆU',`<p class="cvm2-summary cv-editable">${esc(c.summary).replace(/\n/g,'<br>')}</p>`)  :''}

    // ── STYLE 4: Classic (Center name + 2-col split body) ───────
    // Structure: Centered header with accent border + left=experience, right=edu+skills
    function renderClassicStyle(c, accent) {
        const hrColor = accent || '#1a1a1a';

        const contactBits = [
            c.email    ? `<span class="cv-editable">${esc(c.email)}</span>` : '',
            c.phone    ? `<span class="cv-editable">${esc(c.phone)}</span>` : '',
            c.address  ? `<span class="cv-editable">${esc(c.address)}</span>` : '',
            c.linkedin ? `<span class="cv-editable">${esc(c.linkedin)}</span>` : '',
            c.portfolio? `<span class="cv-editable">${esc(c.portfolio)}</span>` : ''
        ].filter(Boolean).join(' · ');

        const lsec = (title, content) => content ? `
            <div class="cvcl2-section">
                <div class="cvcl2-sec-title" style="color:${hrColor};border-left:4px solid ${hrColor};">${title}</div>
                ${content}
            </div>` : '';

        const rsec = (title, content) => content ? `
            <div class="cvcl2-section">
                <div class="cvcl2-sec-title-r" style="border-bottom:2px solid ${hrColor};color:${hrColor};">${title}</div>
                ${content}
            </div>` : '';

        const expHtml = (c.experience||[]).map(e=>`
            <div class="cvcl2-item">
                <div class="cvcl2-item-top">
                    <span class="cvcl2-role cv-editable">${esc(e.role||'')}</span>
                    <span class="cvcl2-date" style="color:${hrColor}">${ed(e.period||'')}</span>
                </div>
                <div class="cvcl2-company cv-editable">${esc(e.company||'')}</div>
                ${(e.details||[]).map(d=>`<div class="cvcl2-bullet">▪ ${ed(d)}</div>`).join('')}
            </div>`).join('');

        const projHtml = (c.projects||[]).map(p=>`
            <div class="cvcl2-item">
                <div class="cvcl2-item-top">
                    <span class="cvcl2-role cv-editable">${esc(p.name||'')}</span>
                    <span class="cvcl2-date" style="color:${hrColor}">${ed(p.period||'')}</span>
                </div>
                ${p.tech?`<div class="cvcl2-company">Tech: ${ed(p.tech)}</div>`:''}
                ${(p.details||[]).map(d=>`<div class="cvcl2-bullet">▪ ${ed(d)}</div>`).join('')}
            </div>`).join('');

        const eduHtml = (c.education||[]).map(e=>`
            <div class="cvcl2-r-item">
                <div class="cvcl2-r-degree cv-editable">${esc(e.degree||'')}</div>
                <div class="cvcl2-r-school cv-editable">${esc(e.school||e.location||'')}</div>
                <div class="cvcl2-r-period" style="color:${hrColor}">${ed(e.period||'')}</div>
            </div>`).join('');

        const skillHtml = (c.skills||[]).map(sg=>`
            <div class="cvcl2-skill">
                <div class="cvcl2-skill-cat">${ed(sg.category)}</div>
                <div class="cvcl2-skill-vals">${(sg.items||[]).map(i=>`<span class="cvcl2-pill" style="border-color:${hrColor}40;color:#333">${ed(i)}</span>`).join('')}</div>
            </div>`).join('');

        const certHtml = (c.certifications||[]).map(cert=>`
            <div class="cvcl2-r-item"><span class="cv-editable">${esc(cert.name||cert.raw||'')}</span>${cert.year?` <span style="color:${hrColor};font-size:11px">(${esc(cert.year)})</span>`:''}</div>`).join('');

        const awardsHtml = (c.awards||[]).map(aw=>`
            <div class="cvcl2-r-item">🏆 <span class="cv-editable">${esc(aw.name||aw.raw||'')}</span>${aw.year?` <span style="color:${hrColor};font-size:11px">(${esc(aw.year)})</span>`:''}</div>`).join('');

        const actHtml = (c.activities||[]).map(a=>`
            <div class="cvcl2-r-item"><span class="cv-editable">${esc(a.name||a.raw||'')}</span>${a.period?` <span style="color:${hrColor};font-size:11px">(${esc(a.period)})</span>`:''}</div>`).join('');

        return `<div class="cv-full cvcl2-root" style="--cv-accent:${hrColor};">

            <div class="cvcl2-header" style="border-top:5px solid ${hrColor};">
                <div class="cvcl2-header-left">
                    ${getAvatarHtml(hrColor+'80', 100, 'square')}

                <div class="cvcl2-header-center">
                    <div class="cvcl2-name cv-editable">${esc(c.name||'HỌ TÊN ỨNG VIÊN')}</div>

                <div class="cvcl2-right">
                    ${rsec('HỌC VẤN', eduHtml)}
                    ${rsec('KỸ NĂNG', skillHtml)}

    // ── STYLE 5: Harvard (Authentic Harvard resume format) ─────
    function renderHarvardStyle(c, accent) {
        // Harvard uses Times New Roman, very traditional formatting

        const contactLine = [
            c.email    ? `${esc(c.email)}` : '',
            c.phone    ? `${esc(c.phone)}` : '',
            c.address  ? `${esc(c.address)}` : '',

                <div class="cvh-title">${title}</div>
                ${content}
            </div>` : '';

        const expHtml = (c.experience||[]).map(e=>`
            <div class="cvh-item">

        const projHtml = (c.projects||[]).map(p=>`

        const skillHtml = (c.skills||[]).map(sg=>`

        const certHtml = (c.certifications||[]).map(cert=>`

        const awardsHtml = (c.awards||[]).map(aw=>`
            <div class="cvh-inline-item">
                <strong class="cv-editable">${esc(aw.name||aw.raw||'')}</strong>

        const actHtml = (c.activities||[]).map(a=>`
            <div class="cvh-item">
                <div class="cvh-item-head">
                    <span class="cvh-item-title cv-editable">${esc(a.name||a.raw||'')}</span>

    // ═══════════════════════════════════════════════════════════
    //  CHAT UI HELPERS
    // ═══════════════════════════════════════════════════════════
    function addAiMsg(html) {
        const el = document.createElement('div');
        el.className = 'msg msg-ai';
        el.innerHTML = `<div class="msg-bubble">${html}</div><div class="msg-time">${nowTime()}</div>`;
        appendMsg(el);
    }

    function addUserMsg(text) {
        const el = document.createElement('div');
        el.className = 'msg msg-user';
        el.innerHTML = `<div class="msg-bubble">${esc(text)}</div><div class="msg-time">${nowTime()}</div>`;
        appendMsg(el);
    }

    function appendMsg(el) {
        const h = document.getElementById('chatHistory');
        h.appendChild(el);
        h.scrollTop = h.scrollHeight;
    }

    let typingEl = null;
    function setAiTyping(on) {
        if (on && !typingEl) {
            typingEl = document.createElement('div');
            typingEl.className = 'typing-indicator';
            typingEl.innerHTML = '<span class="dot-typing"></span><span class="dot-typing"></span><span class="dot-typing"></span>';
            appendMsg(typingEl);
        } else if (!on && typingEl) {
            typingEl.remove();
            typingEl = null;
        }
    }

    function setQuickReplies(chips) {
        const qr = document.getElementById('quickReplies');
        qr.innerHTML = chips.map(c =>
            `<button class="quick-reply" onclick="handleQuickReply('${c}')">${c}</button>`
        ).join('');
    }

    function clearQuickReplies() {
        document.getElementById('quickReplies').innerHTML = '';
    }

    function handleQuickReply(text) {
        document.getElementById('chatInput').value = text;
        handleSend();
    }

    function disableInput(disabled) {
        document.getElementById('chatInput').disabled = disabled;
        document.getElementById('btnSend').style.opacity = disabled ? '0.5' : '1';
        document.getElementById('btnSend').style.pointerEvents = disabled ? 'none' : 'auto';
    }

    function restartChat() {
        if (!confirm('Bắt đầu lại từ đầu? Dữ liệu hiện tại sẽ bị xóa.')) return;
        location.reload();
    }

    function nowTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function esc(str) {
        return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ═══════════════════════════════════════════════════════════
    //  BOOT
    // ═══════════════════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', init);
    </script>
