<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Việc làm đã lưu | CoHoiViecLam</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .saved-jobs-shell {
            max-width: 960px;
            margin: 24px auto 60px;
            padding: 0 24px;
            font-family: 'Inter', sans-serif;
        }
        .saved-jobs-header {
            margin-bottom: 20px;
        }
        .saved-jobs-header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #1e293b;
            margin: 0 0 4px 0;
        }
        .saved-jobs-header p {
            font-size: 13px;
            color: #64748b;
            margin: 0;
        }
        .saved-job-card {
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 10px;
            background: #fff;
            transition: border-color 0.15s;
        }
        .saved-job-card:hover {
            border-color: #94a3b8;
        }
        .saved-job-title {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            margin: 0 0 4px 0;
        }
        .saved-job-company {
            font-size: 13px;
            color: #475569;
            margin: 0 0 6px 0;
        }
        .saved-job-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 12px;
            color: #64748b;
            margin-bottom: 10px;
        }
        .saved-job-meta span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .saved-job-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .btn-detail {
            font-size: 12px;
            padding: 5px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            background: #fff;
            color: #1e293b;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.15s;
        }
        .btn-detail:hover {
            background: #f1f5f9;
        }
        .btn-unsave {
            font-size: 12px;
            padding: 5px 12px;
            border: 1px solid #fca5a5;
            border-radius: 6px;
            background: #fff;
            color: #dc2626;
            cursor: pointer;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            transition: background 0.15s;
        }
        .btn-unsave:hover {
            background: #fef2f2;
        }
        .empty-state {
            text-align: center;
            padding: 48px 16px;
            color: #94a3b8;
        }
        .empty-state svg {
            margin-bottom: 12px;
        }
        .empty-state p {
            font-size: 13px;
            margin: 0 0 12px 0;
        }
        .empty-state a {
            font-size: 13px;
            color: #2563eb;
            text-decoration: none;
        }
        .empty-state a:hover {
            text-decoration: underline;
        }
        .loading-state {
            text-align: center;
            padding: 48px 16px;
            font-size: 13px;
            color: #94a3b8;
        }
        .saved-job-count {
            font-size: 12px;
            color: #94a3b8;
            font-weight: 500;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="saved-jobs-shell">
        <div class="saved-jobs-header">
            <h1>Việc làm đã lưu <span class="saved-job-count" id="jobCount"></span></h1>
            <p>Danh sách các vị trí bạn đã lưu để xem lại sau</p>
        </div>

        <div id="jobList">
            <div class="loading-state">Đang tải...</div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script>
        const jobList = document.getElementById('jobList');
        const jobCount = document.getElementById('jobCount');

        function formatSalary(min, max, currency, show) {
            if (!show) return 'Thỏa thuận';
            if (!min && !max) return 'Thỏa thuận';
            const fmt = n => {
                if (!n) return null;
                const num = Number(n);
                if (num >= 1000000) return (num / 1000000).toFixed(0) + ' triệu';
                if (num >= 1000) return (num / 1000).toFixed(0) + 'k';
                return num.toLocaleString('vi-VN');
            };
            const c = currency || 'VND';
            if (min && max) return fmt(min) + ' - ' + fmt(max) + ' ' + c;
            if (min) return 'Từ ' + fmt(min) + ' ' + c;
            return 'Đến ' + fmt(max) + ' ' + c;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        async function loadSavedJobs() {
            try {
                const res = await fetch('/api/saved-jobs');
                if (res.status === 401) {
                    jobList.innerHTML = '<div class="empty-state"><p>Vui lòng <a href="/candidate-register.html">đăng nhập</a> để xem việc làm đã lưu.</p></div>';
                    return;
                }
                const data = await res.json();
                const jobs = data.savedJobs || [];
                jobCount.textContent = '(' + jobs.length + ')';

                if (jobs.length === 0) {
                    jobList.innerHTML = `
                        <div class="empty-state">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5">
                                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                            </svg>
                            <p>Bạn chưa lưu việc làm nào</p>
                            <a href="/tim-viec-lam.html">Tìm việc làm ngay</a>
                        </div>`;
                    return;
                }

                jobList.innerHTML = jobs.map(job => `
                    <div class="saved-job-card" data-job-id="${job.id}">
                        <div class="saved-job-title">${escHtml(job.title)}</div>
                        <div class="saved-job-company">${escHtml(job.companyName || '')}</div>
                        <div class="saved-job-meta">
                            <span>${escHtml(job.location || '')}</span>
                            <span>${formatSalary(job.salaryMin, job.salaryMax, job.currency, job.showSalary)}</span>
                            ${job.employmentType ? '<span>' + escHtml(job.employmentType) + '</span>' : ''}
                            <span>Lưu ngày ${formatDate(job.savedAt)}</span>
                        </div>
                        <div class="saved-job-actions">
                            <a href="/job-detail.html?id=${job.id}" class="btn-detail">Xem chi tiết</a>
                            <button class="btn-unsave" onclick="unsaveJob(${job.id}, this)">Bỏ lưu</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                jobList.innerHTML = '<div class="empty-state"><p>Không thể tải dữ liệu. Vui lòng thử lại.</p></div>';
            }
        }

        async function unsaveJob(jobId, btn) {
            btn.disabled = true;
            btn.textContent = '...';
            try {
                const res = await fetch('/api/saved-jobs/' + jobId, { method: 'DELETE' });
                const data = await res.json();
                if (data.success) {
                    const card = btn.closest('.saved-job-card');
                    card.style.transition = 'opacity 0.2s';
                    card.style.opacity = '0';
                    setTimeout(() => {
                        card.remove();
                        const remaining = document.querySelectorAll('.saved-job-card').length;
                        jobCount.textContent = '(' + remaining + ')';
                        if (remaining === 0) {
                            jobList.innerHTML = `
                                <div class="empty-state">
                                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="1.5">
                                        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                                    </svg>
                                    <p>Bạn chưa lưu việc làm nào</p>
                                    <a href="/tim-viec-lam.html">Tìm việc làm ngay</a>
                                </div>`;
                        }
                    }, 200);
                }
            } catch (e) {
                btn.disabled = false;
                btn.textContent = 'Bỏ lưu';
            }
        }

        function escHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        loadSavedJobs();
    </script>
    <div id="footer-placeholder"></div>
</body>
</html>
