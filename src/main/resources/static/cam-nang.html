<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cẩm nang tuyển dụng | CareerViet</title>
    <meta name="description" content="Cẩm nang tuyển dụng với bài viết thực chiến về CV, phỏng vấn, thị trường lao động và con đường sự nghiệp.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cam-nang.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="career-guide-page">
    <div id="header-placeholder"></div>

    <nav class="guide-top-nav">
        <div class="guide-nav-container">
            <ul class="guide-nav-list" id="guideTabsNav">
                <!-- Tabs will be rendered here by JS -->
            </ul>
            <div class="guide-nav-actions">
                <button type="button" class="guide-nav-search" onclick="document.body.classList.toggle('search-active')">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
                <div class="guide-nav-brand">Cẩm nang tuyển dụng</div>
            </div>
        </div>
        <div class="guide-search-drop">
            <form id="guideSearchForm">
                <input id="guideSearchInput" type="search" placeholder="Từ khóa, kỹ năng, chủ đề...">
                <button type="submit">Tìm</button>
            </form>
        </div>
    </nav>

    <main class="career-guide-shell" id="guideListPage">

        <section class="guide-grid-section">
            <div class="guide-loading" id="guideLoading" hidden>Đang tải cẩm nang...</div>
            <div id="guideFeatured" class="guide-featured-layout"></div>
        </section>

        <section class="guide-grid-section">
            <div class="guide-section-head">
                <div>
                    <div class="guide-overline">Bài mới nhất</div>
                    <h2>Những nội dung nên đọc tiếp</h2>
                </div>
            </div>
            <div class="guide-grid" id="guideGrid"></div>
            <div class="guide-empty" id="guideEmpty" hidden>
                <strong>Chưa có bài viết phù hợp</strong>
                <div>Thử bỏ bộ lọc hoặc đổi từ khóa để xem thêm nội dung.</div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/main.js"></script>
    <script src="js/cam-nang.js"></script>
</body>
</html>
