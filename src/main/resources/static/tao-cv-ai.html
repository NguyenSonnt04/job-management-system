<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo CV bằng AI | CareerViet</title>
    <meta name="description" content="Tạo CV chuyên nghiệp trong vài phút với trí tuệ nhân tạo.">
    <!-- Main Style -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Page Specific Style -->
    <link rel="stylesheet" href="css/tao-cv-ai.css">
    <!-- CV Editor Styles (for miniature rendering) -->
    <link rel="stylesheet" href="css/cv-editor.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main class="cv-builder-container">
        <div class="container-wrapper">
            <div class="main-layout">
                <!-- Left Sidebar -->
                <aside class="sidebar">
                    <section class="filter-section">
                        <h3>LĨNH VỰC</h3>
                        <div class="filter-list" id="categoryFilter">
                            <div class="filter-item active" data-category="">
                                <i data-lucide="layout-grid"></i>
                                <span>Tất cả mẫu</span>
                            </div>
                        </div>
                    </section>

                    <section class="filter-section">
                        <h3>PHONG CÁCH</h3>
                        <div class="style-options">
                            <label class="style-option">
                                <input type="checkbox" data-style="professional" checked>
                                <span>Chuyên nghiệp</span>
                            </label>
                            <label class="style-option">
                                <input type="checkbox" data-style="classic" checked>
                                <span>Cổ điển</span>
                            </label>
                            <label class="style-option">
                                <input type="checkbox" data-style="modern" checked>
                                <span>Hiện đại</span>
                            </label>
                            <label class="style-option">
                                <input type="checkbox" data-style="impactful" checked>
                                <span>Ấn tượng</span>
                            </label>
                            <label class="style-option">
                                <input type="checkbox" data-style="creative" checked>
                                <span>Sáng tạo</span>
                            </label>
                            <label class="style-option">
                                <input type="checkbox" data-style="ats" checked>
                                <span>ATS</span>
                            </label>
                            <label class="style-option">
                                <input type="checkbox" data-style="harvard" checked>
                                <span>Harvard</span>
                            </label>
                        </div>
                    </section>
                </aside>

                <!-- Right Content Area -->
                <div class="content-area">
                    <div class="search-and-filters">
                        <div class="search-bar-wrapper">
                            <i data-lucide="search"></i>
                            <input type="text" class="search-input" placeholder="Tìm kiếm mẫu CV (VD: 'Hiện đại', 'Fullstack Engineer')...">
                        </div>
                        
                        <div class="quick-filters">
                            <div class="filter-select-wrap">
                                <i data-lucide="folder-kanban"></i>
                                <select id="cvTypeFilter" class="filter-select" aria-label="Lọc theo loại CV">
                                    <option value="">Loại CV: Tất cả</option>
                                </select>
                            </div>
                            <div class="filter-select-wrap">
                                <i data-lucide="swatches"></i>
                                <select id="cvStyleFilter" class="filter-select" aria-label="Lọc theo kiểu CV">
                                    <option value="">Kiểu CV: Tất cả</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Template Grid (dynamic) -->
                    <div class="template-grid" id="templateGrid">
                        <div style="grid-column:1/-1; text-align:center; padding:40px; color:#999;">Đang tải mẫu CV...</div>
                    </div>

                    <!-- Pagination / View All -->
                    <div class="view-all-wrapper">
                        <button class="btn-view-all">
                            Xem tất cả phong cách
                            <i data-lucide="chevron-down"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- ========================= CV Creation Method Modal ========================= -->
    <div class="cv-method-modal-backdrop" id="cvMethodModalBackdrop" aria-hidden="true">
        <div class="cv-method-modal" role="dialog" aria-modal="true" aria-labelledby="cvMethodModalTitle">

            <!-- Left: CV Preview Pane -->
            <div class="cv-method-preview-pane" id="cvMethodPreviewPane">
                <div class="cv-method-preview-label">Mẫu đã chọn</div>
                <div class="cv-method-preview-wrapper" id="cvMethodPreviewWrapper">
                    <!-- Mini CV preview injected by JS -->
                </div>
                <div class="cv-method-preview-templ-name" id="cvMethodPreviewName"></div>
            </div>

            <!-- Right: Options Pane -->
            <div class="cv-method-options-pane">
                <button class="cv-method-close" id="cvMethodCloseBtn" aria-label="Đóng">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>

                <h2 class="cv-method-title" id="cvMethodModalTitle">Bạn muốn tạo CV từ?</h2>
                <p class="cv-method-subtitle">Chọn cách để bắt đầu tạo CV với mẫu này</p>

                <div class="cv-method-options" id="cvMethodOptions">

                    <!-- Option 1: From existing CV in profile -->
                    <label class="cv-method-option" for="method-existing-cv">
                        <input type="radio" name="cvMethod" id="method-existing-cv" value="existing_cv">
                        <div class="cv-method-option-icon" style="background:#EFF6FF; color:#2E3B8E;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                        </div>
                        <div class="cv-method-option-content">
                            <span class="cv-method-option-title">Nội dung CV đã tạo trước đó</span>
                            <span class="cv-method-option-desc">Áp dụng mẫu mới lên CV bạn đã lưu trong hồ sơ</span>
                        </div>
                        <div class="cv-method-option-check">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </div>
                    </label>

                    <!-- Option 2: Brand new from profile -->
                    <label class="cv-method-option" for="method-from-profile">
                        <input type="radio" name="cvMethod" id="method-from-profile" value="from_profile">
                        <div class="cv-method-option-icon" style="background:#F0FDF4; color:#16A34A;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </div>
                        <div class="cv-method-option-content">
                            <span class="cv-method-option-title">Tạo CV mới từ thông tin Profile</span>
                            <span class="cv-method-option-desc">Bắt đầu hoàn toàn mới, chỉ sử dụng thông tin cá nhân từ tài khoản của bạn</span>
                        </div>
                        <div class="cv-method-option-check">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </div>
                    </label>

                </div>

                <!-- Existing CV selector (shown only for option 1) -->
                <div class="cv-method-existing-cv-selector" id="cvExistingCvSelector">
                    <label class="cv-existing-cv-label" for="cvExistingCvSelect">Chọn CV đã lưu</label>
                    <div class="cv-existing-cv-select-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                        <select id="cvExistingCvSelect" class="cv-existing-cv-select">
                            <option value="">-- Đang tải danh sách CV --</option>
                        </select>
                        <svg class="cv-existing-cv-chevron" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                    <div class="cv-existing-cv-empty" id="cvExistingCvEmpty" style="display:none;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        <span>Bạn chưa có CV nào được lưu. Hãy tạo CV mới trước!</span>
                    </div>
                </div>

                <button class="cv-method-proceed-btn" id="cvMethodProceedBtn" disabled>
                    <span>Tiếp tục với mẫu này</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
            </div>
        </div>
    </div>
    <!-- ============================================================ -->


    <script src="js/main.js"></script>
    <!-- CV Editor JS (for miniature rendering) -->
    <script src="js/cv-editor-state.js"></script>
    <script src="js/cv-editor-render.js"></script>
    <script>
        let allTemplates = [];
        let activeCategory = '';
        let searchKeyword = '';
        const activeStyleFilters = new Set(['professional', 'classic', 'modern', 'impactful', 'creative', 'ats', 'harvard']);
        const styleMeta = {
            professional: { label: 'Chuyên nghiệp', bg: '#dbeafe', fg: '#1d4ed8' },
            classic: { label: 'Cổ điển', bg: '#fdf2e2', fg: '#9a3412' },
            modern: { label: 'Hiện đại', bg: '#cffafe', fg: '#0f766e' },
            impactful: { label: 'Ấn tượng', bg: '#fee2e2', fg: '#b91c1c' },
            creative: { label: 'Sáng tạo', bg: '#fce7f3', fg: '#be185d' },
            ats: { label: 'ATS', bg: '#e5e7eb', fg: '#111827' },
            harvard: { label: 'Harvard', bg: '#f3f4f6', fg: '#111827' }
        };

        function normalizeStyleTag(style) {
            const normalized = String(style || '').trim().toLowerCase();
            if (normalized === 'minimalist') return 'modern';
            if (normalized === 'topcv') return 'ats';
            if (normalized === 'impressive') return 'impactful';
            return styleMeta[normalized] ? normalized : 'professional';
        }

        function normalizeTemplateRecord(template) {
            return {
                ...template,
                styleTag: normalizeStyleTag(template.styleTag)
            };
        }

        function getStyleMeta(style) {
            return styleMeta[normalizeStyleTag(style)] || styleMeta.professional;
        }

        function buildStyleFilter() {
            const select = document.getElementById('cvStyleFilter');
            if (!select) return;

            select.innerHTML = `
                <option value="">Kiểu CV: Tất cả</option>
                ${Object.entries(styleMeta).map(([key, meta]) => `<option value="${key}">${meta.label}</option>`).join('')}
            `;
            syncStyleControls();
        }

        function syncStyleCheckboxes() {
            document.querySelectorAll('.style-option input[type="checkbox"]').forEach(input => {
                input.checked = activeStyleFilters.has(normalizeStyleTag(input.dataset.style));
            });
        }

        function syncStyleFilterControl() {
            const select = document.getElementById('cvStyleFilter');
            if (!select) return;
            const selectedStyles = [...activeStyleFilters];
            select.value = selectedStyles.length === 1 ? selectedStyles[0] : '';
        }

        function syncStyleControls() {
            syncStyleCheckboxes();
            syncStyleFilterControl();
        }

        function getFilteredTemplates() {
            return allTemplates.filter(t => {
                const style = normalizeStyleTag(t.styleTag);
                const haystack = [
                    t.name,
                    t.description,
                    t.category,
                    getStyleMeta(style).label
                ].join(' ').toLowerCase();

                const matchesCategory = !activeCategory || t.category === activeCategory;
                const matchesStyle = activeStyleFilters.has(style);
                const matchesSearch = !searchKeyword || haystack.includes(searchKeyword);

                return matchesCategory && matchesStyle && matchesSearch;
            });
        }

        function applyFilters() {
            renderTemplates(getFilteredTemplates());
        }

        // Fetch templates from API
        async function loadTemplates(category = '') {
            try {
                const url = category
                    ? `/api/cv-templates/public?category=${encodeURIComponent(category)}`
                    : '/api/cv-templates/public';
                const res = await fetch(url);
                allTemplates = (await res.json()).map(normalizeTemplateRecord);
                renderTemplates(getFilteredTemplates());
                buildCategoryFilter(allTemplates);
            } catch (e) {
                document.getElementById('templateGrid').innerHTML =
                    '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#999;">Không thể tải dữ liệu. Vui lòng thử lại.</div>';
            }
        }

        function buildCvMiniature(t) {
            // Parse template content from database
            let cv = {};
            try { cv = JSON.parse(t.templateContent || '{}'); } catch(e) {}
            const style = normalizeStyleTag(t.styleTag);
            const accent = t.previewColor || '#2E3B8E';

            // Save current state to restore after rendering
            const savedColor = designState.color;
            const savedSections = { ...designState.sections };
            const savedTitles = { ...(designState.sectionTitles || {}) };

            // Set up global state for rendering functions
            window.currentTemplate = {
                previewColor: accent,
                styleTag: style,
                name: t.name || ''
            };
            currentCvJson = cv;
            designState.color = accent;
            // Enable all sections so miniature shows full template content
            Object.keys(designState.sections).forEach(k => designState.sections[k] = true);
            designState.sectionTitles = cv._designState?.sectionTitles || {};

            // Use the same rendering functions as the actual CV editor
            let html = '';
            if (style === 'creative') {
                html = renderCreativeStyle(cv, accent);
            } else if (style === 'impactful') {
                html = renderImpactfulStyle(cv, accent);
            } else if (style === 'modern') {
                html = renderModernStyle(cv, accent);
            } else if (style === 'classic') {
                html = renderClassicStyle(cv, accent);
            } else if (style === 'harvard') {
                html = renderHarvardStyle(cv, accent);
            } else if (style === 'ats') {
                html = renderAtsStyle(cv, accent);
            } else {
                html = renderProfessionalStyle(cv, accent);
            }

            // Restore state
            designState.color = savedColor;
            Object.assign(designState.sections, savedSections);
            designState.sectionTitles = savedTitles;

            // Return the rendered CV inside the miniature wrapper
            return `<div class="cv-miniature">${html}</div>`;
        }

        function renderTemplates(templates) {
            const grid = document.getElementById('templateGrid');
            if (!templates.length) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:#999;">Chưa có mẫu CV nào trong danh mục này.</div>';
                return;
            }
            grid.innerHTML = templates.map(t => {
                const bgColor = t.previewColor || '#f8fafc';
                const style = getStyleMeta(t.styleTag);
                return `
                <div class="template-card">
                    <div class="template-preview" style="background:${bgColor};">
                        <div class="cv-miniature-wrapper">
                            ${buildCvMiniature(t)}
                        </div>
                        <div class="preview-overlay" aria-hidden="true">
                            <div class="preview-overlay-surface">
                                <div class="preview-overlay-doc">
                                    ${buildCvMiniature(t)}
                                </div>
                                <div class="preview-overlay-meta">
                                    <span class="preview-overlay-pill">Xem nhanh</span>
                                    <span class="preview-overlay-hint">Preview mẫu CV</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="template-info">
                        <div class="template-head">
                            <h3 class="template-title">${escHtml(t.name)}</h3>
                            <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;">
                                <span class="badge-style" style="background:${style.bg};color:${style.fg}">${style.label}</span>
                                ${t.badgeLabel ? `<span class="badge-style" style="background:${t.badgeBgColor||'#e2e8f0'};color:${t.badgeTextColor||'#374151'}">${escHtml(t.badgeLabel)}</span>` : ''}
                            </div>
                        </div>
                        <p class="template-desc">${escHtml(t.description || '')}</p>
                        <button class="btn-use-template" data-id="${t.id}">
                            Sử dụng mẫu này
                            <i data-lucide="arrow-right"></i>
                        </button>
                    </div>
                </div>
            `}).join('');
            lucide.createIcons();
            // Attach click handlers -> open modal instead of navigating
            grid.querySelectorAll('.btn-use-template').forEach(btn => {
                btn.addEventListener('click', function() {
                    openCvMethodModal(this.dataset.id);
                });
            });
        }

        function buildCategoryFilter(templates) {
            const categories = [...new Set(templates.map(t => t.category).filter(Boolean))];
            const iconMap = {
                'Công nghệ & IT': 'code-2',
                'Tài chính & Kinh doanh': 'landmark',
                'Marketing & PR': 'megaphone',
                'Thiết kế & Sáng tạo': 'palette',
                'Giáo dục & Hàn lâm': 'graduation-cap'
            };
            const filterList = document.getElementById('categoryFilter');
            // Keep the "All" item, rebuild the rest
            const allItem = filterList.querySelector('[data-category=""]');
            filterList.innerHTML = '';
            filterList.appendChild(allItem);
            categories.forEach(cat => {
                const icon = iconMap[cat] || 'folder';
                const div = document.createElement('div');
                div.className = 'filter-item';
                div.dataset.category = cat;
                div.innerHTML = `<i data-lucide="${icon}"></i><span>${cat}</span>`;
                div.addEventListener('click', () => selectCategory(cat, div));
                filterList.appendChild(div);
            });
            buildTypeFilter(categories);
            lucide.createIcons();
        }

        function buildTypeFilter(categories) {
            const select = document.getElementById('cvTypeFilter');
            if (!select) return;

            select.innerHTML = `
                <option value="">Loại CV: Tất cả</option>
                ${categories.map(cat => `<option value="${escHtml(cat)}">${escHtml(cat)}</option>`).join('')}
            `;
            select.value = activeCategory;
        }

        function selectCategory(category, el) {
            document.querySelector('.filter-item.active')?.classList.remove('active');
            el.classList.add('active');
            activeCategory = category;
            const typeFilter = document.getElementById('cvTypeFilter');
            if (typeFilter) typeFilter.value = category;
            applyFilters();
        }

        function escHtml(str) {
            return String(str || '')
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ========================= Modal Logic =========================
        let selectedTemplateId = null;

        function openCvMethodModal(templateId) {
            selectedTemplateId = templateId;
            // Reset selection state
            document.querySelectorAll('input[name="cvMethod"]').forEach(r => r.checked = false);
            document.getElementById('cvMethodProceedBtn').disabled = true;
            document.getElementById('cvExistingCvSelector').classList.remove('visible');
            document.querySelectorAll('.cv-method-option').forEach(o => o.classList.remove('selected'));

            // Inject mini CV preview
            const tpl = allTemplates.find(t => String(t.id) === String(templateId));
            if (tpl) {
                document.getElementById('cvMethodPreviewWrapper').innerHTML = buildCvMiniature(tpl);
                document.getElementById('cvMethodPreviewName').textContent = tpl.name || '';
            }

            // Show backdrop
            const backdrop = document.getElementById('cvMethodModalBackdrop');
            backdrop.classList.add('visible');
            backdrop.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
        }

        function closeCvMethodModal() {
            const backdrop = document.getElementById('cvMethodModalBackdrop');
            backdrop.classList.remove('visible');
            backdrop.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        }

        // Close button
        document.getElementById('cvMethodCloseBtn').addEventListener('click', closeCvMethodModal);

        // Click outside modal
        document.getElementById('cvMethodModalBackdrop').addEventListener('click', function(e) {
            if (e.target === this) closeCvMethodModal();
        });

        // ESC key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeCvMethodModal();
        });

        // ── Fetch user's existing CVs ──────────────────────────
        let userCvListCache = null;

        async function fetchUserCvList() {
            if (userCvListCache !== null) return userCvListCache;
            const select = document.getElementById('cvExistingCvSelect');
            const emptyMsg = document.getElementById('cvExistingCvEmpty');
            try {
                const res = await fetch('/api/user-cv');
                if (res.status === 401) {
                    select.innerHTML = '<option value="">-- Bạn cần đăng nhập --</option>';
                    userCvListCache = [];
                    return userCvListCache;
                }
                const list = await res.json();
                userCvListCache = Array.isArray(list) ? list : [];

                if (userCvListCache.length === 0) {
                    select.closest('.cv-existing-cv-select-wrapper').style.display = 'none';
                    emptyMsg.style.display = 'flex';
                } else {
                    select.closest('.cv-existing-cv-select-wrapper').style.display = 'flex';
                    emptyMsg.style.display = 'none';
                    select.innerHTML = '<option value="">-- Chọn CV đã lưu --</option>' +
                        userCvListCache.map(cv => {
                            const date = cv.updatedAt ? new Date(cv.updatedAt).toLocaleDateString('vi-VN') : '';
                            const label = escHtml(cv.cvName || 'CV chưa đặt tên') + (date ? ` (${date})` : '');
                            return `<option value="${cv.id}">${label}</option>`;
                        }).join('');
                }
                return userCvListCache;
            } catch (e) {
                console.error('[tao-cv-ai] fetch user CV list error:', e);
                select.innerHTML = '<option value="">-- Không thể tải danh sách --</option>';
                userCvListCache = [];
                return userCvListCache;
            }
        }

        // Radio option selection
        document.querySelectorAll('input[name="cvMethod"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.querySelectorAll('.cv-method-option').forEach(o => o.classList.remove('selected'));
                this.closest('.cv-method-option').classList.add('selected');

                const existingCvSelector = document.getElementById('cvExistingCvSelector');
                const proceedBtn = document.getElementById('cvMethodProceedBtn');

                if (this.value === 'existing_cv') {
                    existingCvSelector.classList.add('visible');
                    fetchUserCvList();
                    const selectedCv = document.getElementById('cvExistingCvSelect').value;
                    proceedBtn.disabled = !selectedCv;
                } else {
                    existingCvSelector.classList.remove('visible');
                    proceedBtn.disabled = false;
                }
            });
        });

        // Existing CV select change
        document.getElementById('cvExistingCvSelect').addEventListener('change', function() {
            const selectedMethod = document.querySelector('input[name="cvMethod"]:checked');
            if (selectedMethod && selectedMethod.value === 'existing_cv') {
                document.getElementById('cvMethodProceedBtn').disabled = !this.value;
            }
        });

        // Proceed button
        document.getElementById('cvMethodProceedBtn').addEventListener('click', function() {
            const selectedMethod = document.querySelector('input[name="cvMethod"]:checked');
            if (!selectedMethod || !selectedTemplateId) return;

            const method = selectedMethod.value;
            let url = `cv-editor.html?template=${selectedTemplateId}&method=${method}`;

            if (method === 'existing_cv') {
                const sourceCvId = document.getElementById('cvExistingCvSelect').value;
                if (sourceCvId) url += `&sourceCvId=${encodeURIComponent(sourceCvId)}`;
            }

            window.location.href = url;
        });
        // ================================================================

        // Init
        document.querySelector('.filter-item[data-category=""]').addEventListener('click', function() {
            selectCategory('', this);
        });

        document.querySelectorAll('.style-option input[type="checkbox"]').forEach(input => {
            input.addEventListener('change', function() {
                const style = normalizeStyleTag(this.dataset.style);
                if (this.checked) activeStyleFilters.add(style);
                else activeStyleFilters.delete(style);
                syncStyleFilterControl();
                applyFilters();
            });
        });

        document.getElementById('cvTypeFilter')?.addEventListener('change', function() {
            const selectedCategory = this.value;
            const target = [...document.querySelectorAll('.filter-item')]
                .find(item => item.dataset.category === selectedCategory)
                || document.querySelector('.filter-item[data-category=""]');
            if (target) selectCategory(selectedCategory, target);
        });

        document.getElementById('cvStyleFilter')?.addEventListener('change', function() {
            activeStyleFilters.clear();

            if (this.value) {
                activeStyleFilters.add(normalizeStyleTag(this.value));
            } else {
                Object.keys(styleMeta).forEach(style => activeStyleFilters.add(style));
            }

            syncStyleControls();
            applyFilters();
        });

        document.querySelector('.search-input')?.addEventListener('input', function() {
            searchKeyword = this.value.trim().toLowerCase();
            applyFilters();
        });

        buildStyleFilter();
        loadTemplates();
    </script>
</body>
</html>
