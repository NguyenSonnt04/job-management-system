<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo CV bằng AI | CareerViet</title>
    <meta name="description" content="Tạo CV chuyên nghiệp trong vài phút với trí tuệ nhân tạo.">
    <!-- Main Style -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Page Specific Style -->
    <link rel="stylesheet" href="css/tao-cv-ai.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main class="cv-builder-container">
        <div class="container-wrapper">
            <div class="main-layout">
                <!-- Left Sidebar -->
                <aside class="sidebar">
                    <section class="filter-section">
                        <h3>LĨNH VỰC</h3>
                        <div class="filter-list" id="categoryFilter">
                            <div class="filter-item active" data-category="">
                                <i data-lucide="layout-grid"></i>
                                <span>Tất cả mẫu</span>
                            </div>
                        </div>
                    </section>

                    <section class="filter-section">
                        <h3>PHONG CÁCH</h3>
                        <div class="style-options">
                            <label class="style-option">
                                <input type="checkbox" data-style="professional" checked>
                                <span>Chuyên nghiệp</span>
                            </label>
                            <label class="style-option">
                                <input type="checkbox" data-style="classic" checked>
                                <span>Cổ điển</span>
                            </label>
                            <label class="style-option">
                                <input type="checkbox" data-style="modern" checked>
                                <span>Hiện đại</span>
                            </label>
                            <label class="style-option">
                                <input type="checkbox" data-style="impactful" checked>
                                <span>Ấn tượng</span>
                            </label>
                            <label class="style-option">
                                <input type="checkbox" data-style="creative" checked>
                                <span>Sáng tạo</span>
                            </label>
                            <label class="style-option">
                                <input type="checkbox" data-style="ats" checked>
                                <span>ATS</span>
                            </label>
                            <label class="style-option">
                                <input type="checkbox" data-style="harvard" checked>
                                <span>Harvard</span>
                            </label>
                        </div>
                    </section>
                </aside>

                <!-- Right Content Area -->
                <div class="content-area">
                    <div class="search-and-filters">
                        <div class="search-bar-wrapper">
                            <i data-lucide="search"></i>
                            <input type="text" class="search-input" placeholder="Tìm kiếm mẫu CV (VD: 'Hiện đại', 'Fullstack Engineer')...">
                        </div>
                        
                        <div class="quick-filters">
                            <div class="filter-select-wrap">
                                <i data-lucide="folder-kanban"></i>
                                <select id="cvTypeFilter" class="filter-select" aria-label="Lọc theo loại CV">
                                    <option value="">Loại CV: Tất cả</option>
                                </select>
                            </div>
                            <div class="filter-select-wrap">
                                <i data-lucide="swatches"></i>
                                <select id="cvStyleFilter" class="filter-select" aria-label="Lọc theo kiểu CV">
                                    <option value="">Kiểu CV: Tất cả</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Template Grid (dynamic) -->
                    <div class="template-grid" id="templateGrid">
                        <div style="grid-column:1/-1; text-align:center; padding:40px; color:#999;">Đang tải mẫu CV...</div>
                    </div>

                    <!-- Pagination / View All -->
                    <div class="view-all-wrapper">
                        <button class="btn-view-all">
                            Xem tất cả phong cách
                            <i data-lucide="chevron-down"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- ========================= CV Creation Method Modal ========================= -->
    <div class="cv-method-modal-backdrop" id="cvMethodModalBackdrop" aria-hidden="true">
        <div class="cv-method-modal" role="dialog" aria-modal="true" aria-labelledby="cvMethodModalTitle">

            <!-- Left: CV Preview Pane -->
            <div class="cv-method-preview-pane" id="cvMethodPreviewPane">
                <div class="cv-method-preview-label">Mẫu đã chọn</div>
                <div class="cv-method-preview-wrapper" id="cvMethodPreviewWrapper">
                    <!-- Mini CV preview injected by JS -->
                </div>
                <div class="cv-method-preview-templ-name" id="cvMethodPreviewName"></div>
            </div>

            <!-- Right: Options Pane -->
            <div class="cv-method-options-pane">
                <button class="cv-method-close" id="cvMethodCloseBtn" aria-label="Đóng">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>

                <h2 class="cv-method-title" id="cvMethodModalTitle">Bạn muốn tạo CV từ?</h2>
                <p class="cv-method-subtitle">Chọn cách để bắt đầu tạo CV với mẫu này</p>

                <div class="cv-method-options" id="cvMethodOptions">

                    <!-- Option 1: From existing CV in profile -->
                    <label class="cv-method-option" for="method-existing-cv">
                        <input type="radio" name="cvMethod" id="method-existing-cv" value="existing_cv">
                        <div class="cv-method-option-icon" style="background:#EFF6FF; color:#2E3B8E;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                        </div>
                        <div class="cv-method-option-content">
                            <span class="cv-method-option-title">Nội dung CV đã tạo trước đó</span>
                            <span class="cv-method-option-desc">Áp dụng mẫu mới lên CV bạn đã lưu trong hồ sơ</span>
                        </div>
                        <div class="cv-method-option-check">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </div>
                    </label>

                    <!-- Option 2: Keep template, change industry -->
                    <label class="cv-method-option" for="method-keep-template">
                        <input type="radio" name="cvMethod" id="method-keep-template" value="keep_template">
                        <div class="cv-method-option-icon" style="background:#FFF7ED; color:#EA580C;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                        </div>
                        <div class="cv-method-option-content">
                            <span class="cv-method-option-title">Giữ nguyên mẫu, đổi ngành nghề</span>
                            <span class="cv-method-option-desc">Dùng nội dung mẫu CV làm gợi ý, AI sẽ điều chỉnh theo ngành bạn chọn</span>
                        </div>
                        <div class="cv-method-option-check">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </div>
                    </label>

                    <!-- Option 3: Brand new from profile -->
                    <label class="cv-method-option" for="method-from-profile">
                        <input type="radio" name="cvMethod" id="method-from-profile" value="from_profile">
                        <div class="cv-method-option-icon" style="background:#F0FDF4; color:#16A34A;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </div>
                        <div class="cv-method-option-content">
                            <span class="cv-method-option-title">Tạo CV mới từ thông tin Profile</span>
                            <span class="cv-method-option-desc">Bắt đầu hoàn toàn mới, chỉ sử dụng thông tin cá nhân từ tài khoản của bạn</span>
                        </div>
                        <div class="cv-method-option-check">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </div>
                    </label>

                </div>

                <!-- Industry selector (shown only for option 2) -->
                <div class="cv-method-industry-selector" id="cvIndustrySelector">
                    <label class="cv-industry-label" for="cvIndustrySelect">Chọn ngành nghề mục tiêu</label>
                    <div class="cv-industry-select-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                        <select id="cvIndustrySelect" class="cv-industry-select">
                            <option value="">-- Chọn ngành nghề --</option>
                            <option value="Công nghệ thông tin">Công nghệ thông tin</option>
                            <option value="Tài chính - Ngân hàng">Tài chính - Ngân hàng</option>
                            <option value="Marketing - Truyền thông">Marketing - Truyền thông</option>
                            <option value="Thiết kế đồ họa">Thiết kế đồ họa</option>
                            <option value="Kỹ thuật - Xây dựng">Kỹ thuật - Xây dựng</option>
                            <option value="Y tế - Dược">Y tế - Dược</option>
                            <option value="Giáo dục - Đào tạo">Giáo dục - Đào tạo</option>
                            <option value="Nhân sự - Hành chính">Nhân sự - Hành chính</option>
                            <option value="Bán hàng - Kinh doanh">Bán hàng - Kinh doanh</option>
                            <option value="Logistics - Vận tải">Logistics - Vận tải</option>
                            <option value="Khác">Khác</option>
                        </select>
                        <svg class="cv-industry-chevron" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                </div>

                <button class="cv-method-proceed-btn" id="cvMethodProceedBtn" disabled>
                    <span>Tiếp tục với mẫu này</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
            </div>
        </div>
    </div>
    <!-- ============================================================ -->


    <script src="js/main.js"></script>
    <script>
        let allTemplates = [];
        let activeCategory = '';
        let searchKeyword = '';
        const activeStyleFilters = new Set(['professional', 'classic', 'modern', 'impactful', 'creative', 'ats', 'harvard']);
        const styleMeta = {
            professional: { label: 'Chuyên nghiệp', bg: '#dbeafe', fg: '#1d4ed8' },
            classic: { label: 'Cổ điển', bg: '#fdf2e2', fg: '#9a3412' },
            modern: { label: 'Hiện đại', bg: '#cffafe', fg: '#0f766e' },
            impactful: { label: 'Ấn tượng', bg: '#fee2e2', fg: '#b91c1c' },
            creative: { label: 'Sáng tạo', bg: '#fce7f3', fg: '#be185d' },
            ats: { label: 'ATS', bg: '#e5e7eb', fg: '#111827' },
            harvard: { label: 'Harvard', bg: '#f3f4f6', fg: '#111827' }
        };

        function normalizeStyleTag(style) {
            const normalized = String(style || '').trim().toLowerCase();
            if (normalized === 'minimalist') return 'modern';
            if (normalized === 'topcv') return 'ats';
            if (normalized === 'impressive') return 'impactful';
            return styleMeta[normalized] ? normalized : 'professional';
        }

        function normalizeTemplateRecord(template) {
            return {
                ...template,
                styleTag: normalizeStyleTag(template.styleTag)
            };
        }

        function getStyleMeta(style) {
            return styleMeta[normalizeStyleTag(style)] || styleMeta.professional;
        }

        function buildStyleFilter() {
            const select = document.getElementById('cvStyleFilter');
            if (!select) return;

            select.innerHTML = `
                <option value="">Kiểu CV: Tất cả</option>
                ${Object.entries(styleMeta).map(([key, meta]) => `<option value="${key}">${meta.label}</option>`).join('')}
            `;
            syncStyleControls();
        }

        function syncStyleCheckboxes() {
            document.querySelectorAll('.style-option input[type="checkbox"]').forEach(input => {
                input.checked = activeStyleFilters.has(normalizeStyleTag(input.dataset.style));
            });
        }

        function syncStyleFilterControl() {
            const select = document.getElementById('cvStyleFilter');
            if (!select) return;
            const selectedStyles = [...activeStyleFilters];
            select.value = selectedStyles.length === 1 ? selectedStyles[0] : '';
        }

        function syncStyleControls() {
            syncStyleCheckboxes();
            syncStyleFilterControl();
        }

        function getFilteredTemplates() {
            return allTemplates.filter(t => {
                const style = normalizeStyleTag(t.styleTag);
                const haystack = [
                    t.name,
                    t.description,
                    t.category,
                    getStyleMeta(style).label
                ].join(' ').toLowerCase();

                const matchesCategory = !activeCategory || t.category === activeCategory;
                const matchesStyle = activeStyleFilters.has(style);
                const matchesSearch = !searchKeyword || haystack.includes(searchKeyword);

                return matchesCategory && matchesStyle && matchesSearch;
            });
        }

        function applyFilters() {
            renderTemplates(getFilteredTemplates());
        }

        // Fetch templates from API
        async function loadTemplates(category = '') {
            try {
                const url = category
                    ? `/api/cv-templates/public?category=${encodeURIComponent(category)}`
                    : '/api/cv-templates/public';
                const res = await fetch(url);
                allTemplates = (await res.json()).map(normalizeTemplateRecord);
                renderTemplates(getFilteredTemplates());
                buildCategoryFilter(allTemplates);
            } catch (e) {
                document.getElementById('templateGrid').innerHTML =
                    '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#999;">Không thể tải dữ liệu. Vui lòng thử lại.</div>';
            }
        }

        function buildCvMiniature(t) {
            let cv = {};
            try { cv = JSON.parse(t.templateContent || '{}'); } catch(e) {}
            const style = normalizeStyleTag(t.styleTag);
            const accent = t.previewColor || '#2E3B8E';
            const esc = escHtml;
            const name = esc(cv.name || t.name || 'CV Template');
            const subtitle = esc(cv.subtitle || 'Professional Profile');
            const summaryRaw = String(cv.summary || 'Tóm tắt định hướng nghề nghiệp và điểm mạnh nổi bật.')
                .replace(/\s+/g, ' ')
                .trim();
            const summary = esc(summaryRaw.length > 110 ? `${summaryRaw.slice(0, 107)}...` : summaryRaw);
            const experience = (cv.experience || [])[0] || {};
            const education = (cv.education || [])[0] || {};
            const primarySkills = (cv.skills || [])
                .flatMap(group => group.items || [])
                .slice(0, 5)
                .map(item => `<span style="padding:2px 5px;border-radius:999px;background:${accent}14;color:${accent};font-size:5.8px;font-weight:700;">${esc(item)}</span>`)
                .join('');
            const firstSkillGroup = (cv.skills || [])[0];
            const skillBlock = firstSkillGroup
                ? `<div style="display:flex; gap:6px; font-size:6px; line-height:1.5;">
                        <strong style="min-width:38px; color:#0f172a;">${esc(firstSkillGroup.category || 'Kỹ năng')}</strong>
                        <span style="color:#475569;">${esc((firstSkillGroup.items || []).slice(0, 4).join(', '))}</span>
                   </div>`
                : '';

            if (style === 'creative') {
                return `
                    <div class="cv-miniature" style="background:#fff;">
                        <div style="height:38px;background:linear-gradient(135deg, ${accent}, ${accent}bb 65%, #111827);padding:10px 12px;color:#fff;display:flex;align-items:flex-start;gap:10px;">
                            <div style="width:28px;height:28px;border-radius:10px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.4);"></div>
                            <div style="min-width:0;flex:1;">
                                <div style="font-size:10px;font-weight:800;letter-spacing:.2px;">${name}</div>
                                <div style="font-size:6px;opacity:.9;letter-spacing:1px;text-transform:uppercase;">${subtitle}</div>
                            </div>
                        </div>
                        <div style="padding:10px 12px 12px;background:linear-gradient(180deg,#fff 0%,#f8fafc 100%);display:grid;grid-template-columns:37% 1fr;gap:10px;">
                            <div style="display:flex;flex-direction:column;gap:8px;">
                                <div style="font-size:5.6px;font-weight:800;color:${accent};letter-spacing:1.2px;text-transform:uppercase;">Giới thiệu</div>
                                <div style="font-size:5.9px;line-height:1.55;color:#475569;">${summary}</div>
                                <div style="display:flex;flex-wrap:wrap;gap:4px;">${primarySkills}</div>
                            </div>
                            <div style="display:flex;flex-direction:column;gap:8px;">
                                <div style="padding:8px 9px;border-radius:12px;background:#fff;border:1px solid ${accent}22;box-shadow:0 8px 20px rgba(15,23,42,.06);">
                                    <div style="font-size:8px;font-weight:800;color:#0f172a;">${esc(experience.role || 'Lead Product Designer')}</div>
                                    <div style="font-size:5.8px;color:${accent};font-weight:700;">${esc(experience.company || 'Creative Studio')} | ${esc(experience.period || '2022 - nay')}</div>
                                    <div style="margin-top:5px;font-size:5.8px;line-height:1.55;color:#475569;">${esc(((experience.details || [])[0]) || 'Dẫn dắt các dự án thiết kế sản phẩm số và cải thiện trải nghiệm người dùng.')}</div>
                                </div>
                                <div style="padding:8px 9px;border-radius:12px;background:#fff;border:1px solid #e2e8f0;">
                                    <div style="font-size:5.6px;font-weight:800;color:${accent};letter-spacing:1.1px;text-transform:uppercase;">Học vấn</div>
                                    <div style="margin-top:4px;font-size:6px;font-weight:700;color:#0f172a;">${esc(education.degree || 'Cử nhân Thiết kế')}</div>
                                    <div style="font-size:5.8px;color:#64748b;">${esc(education.school || 'Đại học Mỹ thuật')}</div>
                                </div>
                            </div>
                        </div>
                    </div>`;
            }

            if (style === 'modern') {
                return `
                    <div class="cv-miniature" style="background:#fff;border:1px solid #eef2f7;">
                        <div style="display:flex;align-items:stretch;">
                            <div style="width:6px;background:${accent};"></div>
                            <div style="flex:1;padding:12px 14px 10px;">
                                <div style="font-size:10px;font-weight:800;letter-spacing:-.1px;color:#0f172a;">${name}</div>
                                <div style="font-size:6px;color:#64748b;margin-top:2px;">${subtitle}</div>
                                <div style="margin-top:6px;font-size:5.7px;color:#94a3b8;">${esc(cv.email || 'email@example.com')} · ${esc(cv.phone || '0900 000 000')}</div>
                            </div>
                        </div>
                        <div style="padding:0 14px 12px;">
                            <div style="display:grid;grid-template-columns:48px 1fr;gap:10px;padding:8px 0;border-top:1px solid #eef2f7;">
                                <div style="font-size:5.1px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;color:${accent};">Hồ sơ</div>
                                <div style="font-size:5.9px;line-height:1.65;color:#475569;">${summary}</div>
                            </div>
                            <div style="display:grid;grid-template-columns:48px 1fr;gap:10px;padding:8px 0;border-top:1px solid #eef2f7;">
                                <div style="font-size:5.1px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;color:${accent};">Kinh nghiệm</div>
                                <div style="font-size:5.8px;line-height:1.55;color:#475569;">
                                    <div style="font-size:7px;font-weight:700;color:#0f172a;">${esc(experience.role || 'Backend Developer')}</div>
                                    <div style="font-size:5.5px;color:#94a3b8;">${esc(experience.period || '2022 - nay')}</div>
                                    <div style="margin-top:4px;">${esc(((experience.details || [])[0]) || 'Xây dựng hệ thống ổn định, dễ mở rộng và tối ưu hiệu suất.')}</div>
                                </div>
                            </div>
                            ${skillBlock ? `<div style="padding-top:8px;border-top:1px solid #eef2f7;">${skillBlock}</div>` : ''}
                        </div>
                    </div>`;
            }

            if (style === 'classic') {
                return `
                    <div class="cv-miniature" style="background:#fffdf8;border:1px solid #e7dcc7;">
                        <div style="padding:12px 14px 10px;text-align:center;border-top:4px solid ${accent};border-bottom:1px solid #eadfcd;">
                            <div style="font-family:Georgia,serif;font-size:10px;font-weight:700;color:#1f2937;letter-spacing:.4px;">${name}</div>
                            <div style="font-family:Georgia,serif;font-size:6px;font-style:italic;color:${accent};margin-top:2px;">${subtitle}</div>
                            <div style="font-size:5.6px;color:#6b7280;margin-top:5px;">${esc(cv.email || 'email@example.com')} · ${esc(cv.phone || '0900 000 000')}</div>
                        </div>
                        <div style="display:grid;grid-template-columns:1fr 74px;gap:12px;padding:10px 14px 12px;">
                            <div>

        function buildCategoryFilter(templates) {
            const categories = [...new Set(templates.map(t => t.category).filter(Boolean))];
            const iconMap = {
                'Công nghệ & IT': 'code-2',
                'Tài chính & Kinh doanh': 'landmark',
                'Marketing & PR': 'megaphone',
                'Thiết kế & Sáng tạo': 'palette',
                'Giáo dục & Hàn lâm': 'graduation-cap'
            };
            const filterList = document.getElementById('categoryFilter');
            // Keep the "All" item, rebuild the rest
            const allItem = filterList.querySelector('[data-category=""]');
            filterList.innerHTML = '';
            filterList.appendChild(allItem);
            categories.forEach(cat => {
                const icon = iconMap[cat] || 'folder';
                const div = document.createElement('div');
                div.className = 'filter-item';
                div.dataset.category = cat;
                div.innerHTML = `<i data-lucide="${icon}"></i><span>${cat}</span>`;
                div.addEventListener('click', () => selectCategory(cat, div));
                filterList.appendChild(div);
            });
            buildTypeFilter(categories);
            lucide.createIcons();
        }

        function buildTypeFilter(categories) {
            const select = document.getElementById('cvTypeFilter');
            if (!select) return;

            select.innerHTML = `
                <option value="">Loại CV: Tất cả</option>

            select.value = activeCategory;

        function selectCategory(category, el) {
            document.querySelector('.filter-item.active')?.classList.remove('active');
            el.classList.add('active');

            if (typeFilter) typeFilter.value = category;
            applyFilters();

        function escHtml(str) {
            return String(str || '')
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ========================= Modal Logic =========================
        let selectedTemplateId = null;

        function openCvMethodModal(templateId) {
            selectedTemplateId = templateId;
            // Reset selection state
            document.querySelectorAll('input[name="cvMethod"]').forEach(r => r.checked = false);
            document.getElementById('cvMethodProceedBtn').disabled = true;
            document.getElementById('cvIndustrySelector').classList.remove('visible');
            document.querySelectorAll('.cv-method-option').forEach(o => o.classList.remove('selected'));

            // Inject mini CV preview
            const tpl = allTemplates.find(t => String(t.id) === String(templateId));
            if (tpl) {
                document.getElementById('cvMethodPreviewWrapper').innerHTML = buildCvMiniature(tpl);
                document.getElementById('cvMethodPreviewName').textContent = tpl.name || '';
            }

            // Show backdrop
            const backdrop = document.getElementById('cvMethodModalBackdrop');
            backdrop.classList.add('visible');
            backdrop.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
        }

        function closeCvMethodModal() {
            const backdrop = document.getElementById('cvMethodModalBackdrop');
            backdrop.classList.remove('visible');
            backdrop.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        }

        // Close button
        document.getElementById('cvMethodCloseBtn').addEventListener('click', closeCvMethodModal);

        // Click outside modal
        document.getElementById('cvMethodModalBackdrop').addEventListener('click', function(e) {
            if (e.target === this) closeCvMethodModal();
        });

        // ESC key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeCvMethodModal();
        });

        // Radio option selection
        document.querySelectorAll('input[name="cvMethod"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.querySelectorAll('.cv-method-option').forEach(o => o.classList.remove('selected'));
                this.closest('.cv-method-option').classList.add('selected');

                const industrySelector = document.getElementById('cvIndustrySelector');
                const proceedBtn = document.getElementById('cvMethodProceedBtn');

                if (this.value === 'keep_template') {
                    industrySelector.classList.add('visible');
                    // Enable only if industry also selected
                    const industry = document.getElementById('cvIndustrySelect').value;
                    proceedBtn.disabled = !industry;
                } else {
                    industrySelector.classList.remove('visible');
                    proceedBtn.disabled = false;
                }
            });
        });

        // Industry select change
        document.getElementById('cvIndustrySelect').addEventListener('change', function() {
            const selectedMethod = document.querySelector('input[name="cvMethod"]:checked');
            if (selectedMethod && selectedMethod.value === 'keep_template') {
                document.getElementById('cvMethodProceedBtn').disabled = !this.value;
            }
        });

        // Proceed button
        document.getElementById('cvMethodProceedBtn').addEventListener('click', function() {
            const selectedMethod = document.querySelector('input[name="cvMethod"]:checked');
            if (!selectedMethod || !selectedTemplateId) return;

            const method = selectedMethod.value;
            let url = `cv-editor.html?template=${selectedTemplateId}&method=${method}`;

            if (method === 'keep_template') {
                const industry = document.getElementById('cvIndustrySelect').value;
                if (industry) url += `&industry=${encodeURIComponent(industry)}`;
            }

            window.location.href = url;

                syncStyleFilterControl();
                applyFilters();

                        </div>
                    </div>
                    <div style="padding:0 14px 12px;">
                        <div style="display:grid;grid-template-columns:48px 1fr;gap:10px;padding:8px 0;border-top:1px solid #eef2f7;">
                            <div style="font-size:5.1px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;color:${accent};">Hồ sơ</div>
                            <div style="font-size:5.9px;line-height:1.65;color:#475569;">${summary}</div>
                        </div>
                        <div style="display:grid;grid-template-columns:48px 1fr;gap:10px;padding:8px 0;border-top:1px solid #eef2f7;">
                            <div style="font-size:5.1px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;color:${accent};">Kinh nghiệm</div>
                            <div style="font-size:5.8px;line-height:1.55;color:#475569;">
                                <div style="font-size:7px;font-weight:700;color:#0f172a;">${esc(experience.role || 'Product Analyst')}</div>
                                <div style="font-size:5.5px;color:#94a3b8;">${esc(experience.period || '2022 - nay')}</div>
                                <div style="margin-top:4px;">${esc(((experience.details || [])[0]) || 'Tối ưu quy trình, hệ thống hóa dữ liệu và trình bày thông tin mạch lạc.')}</div>
                            </div>
                        </div>
                        <div style="padding-top:8px;border-top:1px solid #eef2f7;">${firstSkillGroup ? `<div style="display:flex;gap:6px;font-size:6px;line-height:1.5;"><strong style="min-width:38px;color:#0f172a;">${esc(firstSkillGroup.category || 'Kỹ năng')}</strong><span style="color:#475569;">${skillText}</span></div>` : ''}</div>
                    </div>
                </div>`;
            }

            if (style === 'classic') {
                return `<div class="cv-miniature" style="background:#fffdf8;border:1px solid #e7dcc7;">
                    <div style="padding:12px 14px 10px;text-align:center;border-top:4px solid ${accent};border-bottom:1px solid #eadfcd;">
                        <div style="font-family:Georgia,serif;font-size:10px;font-weight:700;color:#1f2937;letter-spacing:.4px;">${name}</div>
                        <div style="font-family:Georgia,serif;font-size:6px;font-style:italic;color:${accent};margin-top:2px;">${subtitle}</div>
                        <div style="font-size:5.6px;color:#6b7280;margin-top:5px;">${esc(cv.email || 'email@example.com')} · ${esc(cv.phone || '0900 000 000')}</div>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 74px;gap:12px;padding:10px 14px 12px;">
                        <div>
                            <div style="font-size:5.2px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:${accent};margin-bottom:5px;">Kinh nghiệm</div>
                            <div style="font-family:Georgia,serif;font-size:7px;font-weight:700;color:#111827;">${esc(experience.role || 'Financial Analyst')}</div>
                            <div style="font-size:5.7px;color:#6b7280;font-style:italic;">${esc(experience.company || 'Corporate Group')}</div>
                            <div style="margin-top:4px;font-size:5.8px;line-height:1.55;color:#4b5563;">${esc(((experience.details || [])[0]) || 'Định hình chiến lược, báo cáo và phân tích chuyên sâu cho lãnh đạo.')}</div>
                        </div>
                        <div style="border-left:1px solid #eadfcd;padding-left:10px;">
                            <div style="font-size:5.2px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:${accent};margin-bottom:5px;">Học vấn</div>
                            <div style="font-family:Georgia,serif;font-size:6.5px;font-weight:700;color:#111827;">${esc(education.degree || 'MBA')}</div>
                            <div style="font-size:5.6px;color:#6b7280;">${esc(education.school || 'University')}</div>
                            <div style="margin-top:8px;font-size:5.2px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:${accent};">Kỹ năng</div>
                            <div style="margin-top:4px;font-size:5.6px;line-height:1.5;color:#4b5563;">${esc(flatSkills.length ? flatSkills.join(', ') : 'Phân tích, quản trị, giao tiếp')}</div>
                        </div>
                    </div>
                </div>`;
            }

            if (style === 'ats') {
                return `<div class="cv-miniature" style="background:#fff;border:1px solid #d1d5db;">
                    <div style="padding:12px 14px 10px;border-bottom:1px solid #111827;">
                        <div style="font-size:10px;font-weight:800;color:#111827;letter-spacing:.2px;">${name}</div>
                        <div style="font-size:5.8px;font-weight:700;text-transform:uppercase;letter-spacing:1.4px;color:#4b5563;margin-top:3px;">${subtitle}</div>
                        <div style="margin-top:6px;font-size:5.6px;color:#6b7280;">${esc(cv.email || 'email@example.com')} | ${esc(cv.phone || '0900 000 000')} | ${esc(cv.address || 'Hà Nội')}</div>
                    </div>
                    <div style="padding:10px 14px 12px;">
                        <div style="font-size:5.2px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#111827;padding-bottom:3px;border-bottom:1px solid #111827;">Tóm tắt chuyên môn</div>
                        <div style="margin-top:5px;font-size:5.8px;line-height:1.55;color:#374151;">${summary}</div>
                        <div style="margin-top:8px;font-size:5.2px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#111827;padding-bottom:3px;border-bottom:1px solid #111827;">Kinh nghiệm</div>
                        <div style="margin-top:5px;font-size:5.9px;line-height:1.55;color:#374151;">
                            <div style="display:flex;justify-content:space-between;gap:8px;">
                                <strong>${esc(experience.role || 'Business Analyst')}</strong>
                                <span>${esc(experience.period || '2022 - nay')}</span>
                            </div>
                            <div style="margin-top:2px;color:#6b7280;">${esc(experience.company || 'Corporate Services')}</div>
                            <div style="margin-top:3px;">• ${esc(((experience.details || [])[0]) || 'Tóm lược kinh nghiệm bằng ngôn ngữ rõ ràng, dễ quét bởi nhà tuyển dụng và ATS.')}</div>
                        </div>
                    </div>
                </div>`;
            }

            if (style === 'harvard') {
                return `<div class="cv-miniature" style="background:#fff;border:1px solid #d1d5db;">
                    <div style="padding:12px 14px 8px;text-align:center;">
                        <div style="font-family:'Times New Roman',serif;font-size:10px;font-weight:700;color:#111827;letter-spacing:.5px;">${name}</div>
                        <div style="font-family:'Times New Roman',serif;font-size:6px;color:#4b5563;margin-top:4px;padding-top:4px;border-top:1px solid #111827;">${esc(cv.email || 'email@example.com')} | ${esc(cv.phone || '0900 000 000')} | ${esc(cv.address || 'Hà Nội')}</div>
                    </div>
                    <div style="padding:0 14px 12px;">
                        <div style="margin-top:6px;font-family:'Times New Roman',serif;font-size:5.6px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;border-bottom:1px solid #111827;padding-bottom:2px;">Professional Summary</div>
                        <div style="margin-top:5px;font-family:'Times New Roman',serif;font-size:6px;line-height:1.55;color:#1f2937;">${summary}</div>
                        <div style="margin-top:8px;font-family:'Times New Roman',serif;font-size:5.6px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;border-bottom:1px solid #111827;padding-bottom:2px;">Experience</div>
                        <div style="margin-top:5px;font-family:'Times New Roman',serif;font-size:6px;line-height:1.55;color:#1f2937;">
                            <div style="display:flex;justify-content:space-between;gap:8px;"><strong>${esc(experience.role || 'Research Assistant')}</strong><span>${esc(experience.period || '2021 - nay')}</span></div>
                            <div>${esc(experience.company || 'Academic Institution')}</div>
                            <div style="margin-top:3px;">• ${esc(((experience.details || [])[0]) || 'Dẫn dắt nghiên cứu, tổng hợp dữ liệu và trình bày kết quả học thuật.')}</div>
                        </div>
                    </div>
                </div>`;
            }

            return `<div class="cv-miniature" style="background:#fff;">
                <div style="height:38px;background:linear-gradient(135deg, ${accent}, ${accent}cc);padding:10px 12px;color:#fff;display:flex;gap:10px;">
                    <div style="width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,.65);background:rgba(255,255,255,.18);"></div>
                    <div style="min-width:0;flex:1;">
                        <div style="font-size:10px;font-weight:800;letter-spacing:.3px;">${name}</div>
                        <div style="font-size:6px;opacity:.92;">${subtitle}</div>
                        <div style="margin-top:5px;font-size:5.4px;opacity:.85;display:flex;flex-wrap:wrap;gap:6px;"><span>${esc(cv.email || 'email@example.com')}</span><span>${esc(cv.phone || '0900 000 000')}</span></div>
                    </div>
                </div>
                <div style="display:grid;grid-template-columns:36% 1fr;min-height:120px;">
                    <div style="background:#f6f8fb;padding:10px 10px 12px;border-right:1px solid #e2e8f0;">
                        <div style="font-size:5.4px;font-weight:800;letter-spacing:1.3px;text-transform:uppercase;color:${accent};margin-bottom:6px;">Kỹ năng</div>
                        <div style="display:flex;flex-direction:column;gap:6px;font-size:5.7px;color:#475569;">${(cv.skills || []).slice(0, 2).map(group => `<div><div style="font-weight:700;color:#0f172a;margin-bottom:2px;">${esc(group.category || '')}</div><div>${esc((group.items || []).slice(0, 3).join(', '))}</div></div>`).join('')}</div>
                        <div style="margin-top:8px;font-size:5.4px;font-weight:800;letter-spacing:1.3px;text-transform:uppercase;color:${accent};margin-bottom:5px;">Học vấn</div>
                        <div style="font-size:5.8px;color:#475569;line-height:1.5;"><div style="font-weight:700;color:#0f172a;">${esc(education.degree || 'Cử nhân CNTT')}</div><div>${esc(education.school || 'Đại học')}</div></div>
                    </div>
                    <div style="padding:10px 12px;">
                        <div style="font-size:5.4px;font-weight:800;letter-spacing:1.3px;text-transform:uppercase;color:${accent};padding-bottom:4px;border-bottom:1.4px solid ${accent};">Hồ sơ</div>
                        <div style="margin-top:5px;font-size:5.9px;line-height:1.6;color:#475569;">${summary}</div>
                        <div style="margin-top:10px;font-size:5.4px;font-weight:800;letter-spacing:1.3px;text-transform:uppercase;color:${accent};padding-bottom:4px;border-bottom:1.4px solid ${accent};">Kinh nghiệm</div>
                        <div style="margin-top:6px;"><div style="font-size:7.1px;font-weight:700;color:#0f172a;">${esc(experience.role || 'Software Engineer')}</div><div style="font-size:5.8px;color:${accent};font-weight:700;">${esc(experience.company || 'FPT Software')} | ${esc(experience.period || '2022 - nay')}</div><div style="margin-top:4px;font-size:5.8px;line-height:1.55;color:#475569;">${esc(((experience.details || [])[0]) || 'Phát triển sản phẩm, tối ưu hiệu suất và cải thiện trải nghiệm người dùng.')}</div></div>
                    </div>
                </div>
            </div>`;
        }

        buildStyleFilter();
        loadTemplates();
    </script>
</body>
</html>
