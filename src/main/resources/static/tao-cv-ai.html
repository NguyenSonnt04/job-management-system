<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo CV bằng AI | CareerViet</title>
    <meta name="description" content="Tạo CV chuyên nghiệp trong vài phút với trí tuệ nhân tạo.">
    <!-- Main Style -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Page Specific Style -->
    <link rel="stylesheet" href="css/tao-cv-ai.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main class="cv-builder-container">
        <div class="container-wrapper">
            <div class="main-layout">
                <!-- Left Sidebar -->
                <aside class="sidebar">
                    <section class="filter-section">
                        <h3>LĨNH VỰC</h3>
                        <div class="filter-list" id="categoryFilter">
                            <div class="filter-item active" data-category="">
                                <i data-lucide="layout-grid"></i>
                                <span>Tất cả mẫu</span>
                            </div>
                        </div>
                    </section>

                    <section class="filter-section">
                        <h3>PHONG CÁCH</h3>
                        <div class="style-options">
                            <label class="style-option">
                                <input type="checkbox" checked>
                                <span>Tối giản (Minimalist)</span>
                            </label>
                            <label class="style-option">
                                <input type="checkbox" checked>
                                <span>Chuyên nghiệp</span>
                            </label>
                            <label class="style-option">
                                <input type="checkbox">
                                <span>Sáng tạo</span>
                            </label>
                        </div>
                    </section>
                </aside>

                <!-- Right Content Area -->
                <div class="content-area">
                    <div class="search-and-filters">
                        <div class="search-bar-wrapper">
                            <i data-lucide="search"></i>
                            <input type="text" class="search-input" placeholder="Tìm kiếm mẫu CV (VD: 'Hiện đại', 'Fullstack Engineer')...">
                        </div>
                        
                        <div class="quick-filters">
                            <div class="filter-btn">
                                <span>Chuyên nghiệp</span>
                                <i data-lucide="chevron-down"></i>
                            </div>
                            <div class="filter-btn">
                                <span>Mức kinh nghiệm</span>
                                <i data-lucide="chevron-down"></i>
                            </div>
                            <div class="filter-btn">
                                <span>Màu sắc</span>
                                <i data-lucide="palette"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Template Grid (dynamic) -->
                    <div class="template-grid" id="templateGrid">
                        <div style="grid-column:1/-1; text-align:center; padding:40px; color:#999;">Đang tải mẫu CV...</div>
                    </div>

                    <!-- Pagination / View All -->
                    <div class="view-all-wrapper">
                        <button class="btn-view-all">
                            Xem tất cả phong cách
                            <i data-lucide="chevron-down"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- ========================= CV Creation Method Modal ========================= -->
    <div class="cv-method-modal-backdrop" id="cvMethodModalBackdrop" aria-hidden="true">
        <div class="cv-method-modal" role="dialog" aria-modal="true" aria-labelledby="cvMethodModalTitle">

            <!-- Left: CV Preview Pane -->
            <div class="cv-method-preview-pane" id="cvMethodPreviewPane">
                <div class="cv-method-preview-label">Mẫu đã chọn</div>
                <div class="cv-method-preview-wrapper" id="cvMethodPreviewWrapper">
                    <!-- Mini CV preview injected by JS -->
                </div>
                <div class="cv-method-preview-templ-name" id="cvMethodPreviewName"></div>
            </div>

            <!-- Right: Options Pane -->
            <div class="cv-method-options-pane">
                <button class="cv-method-close" id="cvMethodCloseBtn" aria-label="Đóng">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>

                <h2 class="cv-method-title" id="cvMethodModalTitle">Bạn muốn tạo CV từ?</h2>
                <p class="cv-method-subtitle">Chọn cách để bắt đầu tạo CV với mẫu này</p>

                <div class="cv-method-options" id="cvMethodOptions">

                    <!-- Option 1: From existing CV in profile -->
                    <label class="cv-method-option" for="method-existing-cv">
                        <input type="radio" name="cvMethod" id="method-existing-cv" value="existing_cv">
                        <div class="cv-method-option-icon" style="background:#EFF6FF; color:#2E3B8E;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                        </div>
                        <div class="cv-method-option-content">
                            <span class="cv-method-option-title">Nội dung CV đã tạo trước đó</span>
                            <span class="cv-method-option-desc">Áp dụng mẫu mới lên CV bạn đã lưu trong hồ sơ</span>
                        </div>
                        <div class="cv-method-option-check">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </div>
                    </label>

                    <!-- Option 2: Keep template, change industry -->
                    <label class="cv-method-option" for="method-keep-template">
                        <input type="radio" name="cvMethod" id="method-keep-template" value="keep_template">
                        <div class="cv-method-option-icon" style="background:#FFF7ED; color:#EA580C;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                        </div>
                        <div class="cv-method-option-content">
                            <span class="cv-method-option-title">Giữ nguyên mẫu, đổi ngành nghề</span>
                            <span class="cv-method-option-desc">Dùng nội dung mẫu CV làm gợi ý, AI sẽ điều chỉnh theo ngành bạn chọn</span>
                        </div>
                        <div class="cv-method-option-check">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </div>
                    </label>

                    <!-- Option 3: Brand new from profile -->
                    <label class="cv-method-option" for="method-from-profile">
                        <input type="radio" name="cvMethod" id="method-from-profile" value="from_profile">
                        <div class="cv-method-option-icon" style="background:#F0FDF4; color:#16A34A;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </div>
                        <div class="cv-method-option-content">
                            <span class="cv-method-option-title">Tạo CV mới từ thông tin Profile</span>
                            <span class="cv-method-option-desc">Bắt đầu hoàn toàn mới, chỉ sử dụng thông tin cá nhân từ tài khoản của bạn</span>
                        </div>
                        <div class="cv-method-option-check">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        </div>
                    </label>

                </div>

                <div class="cv-method-existing-selector" id="cvExistingSelector">
                    <label class="cv-existing-label" for="cvExistingSelect">Chọn CV đã lưu</label>
                    <div class="cv-existing-select-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        <select id="cvExistingSelect" class="cv-existing-select" disabled>
                            <option value="">-- Chọn CV muốn áp dụng mẫu --</option>
                        </select>
                        <svg class="cv-existing-chevron" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                    <p class="cv-existing-hint" id="cvExistingHint">Chọn một CV đã lưu để áp dụng mẫu mới.</p>
                </div>

                <!-- Industry selector (shown only for option 2) -->
                <div class="cv-method-industry-selector" id="cvIndustrySelector">
                    <label class="cv-industry-label" for="cvIndustrySelect">Chọn ngành nghề mục tiêu</label>
                    <div class="cv-industry-select-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
                        <select id="cvIndustrySelect" class="cv-industry-select">
                            <option value="">-- Chọn ngành nghề --</option>
                            <option value="Công nghệ thông tin">Công nghệ thông tin</option>
                            <option value="Tài chính - Ngân hàng">Tài chính - Ngân hàng</option>
                            <option value="Marketing - Truyền thông">Marketing - Truyền thông</option>
                            <option value="Thiết kế đồ họa">Thiết kế đồ họa</option>
                            <option value="Kỹ thuật - Xây dựng">Kỹ thuật - Xây dựng</option>
                            <option value="Y tế - Dược">Y tế - Dược</option>
                            <option value="Giáo dục - Đào tạo">Giáo dục - Đào tạo</option>
                            <option value="Nhân sự - Hành chính">Nhân sự - Hành chính</option>
                            <option value="Bán hàng - Kinh doanh">Bán hàng - Kinh doanh</option>
                            <option value="Logistics - Vận tải">Logistics - Vận tải</option>
                            <option value="Khác">Khác</option>
                        </select>
                        <svg class="cv-industry-chevron" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                </div>

                <button class="cv-method-proceed-btn" id="cvMethodProceedBtn" disabled>
                    <span>Tiếp tục với mẫu này</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
            </div>
        </div>
    </div>
    <!-- ============================================================ -->


    <script src="js/main.js"></script>
    <script>
        let allTemplates = [];
        let activeCategory = '';

        // Fetch templates from API
        async function loadTemplates(category = '') {
            try {
                const url = category
                    ? `/api/cv-templates/public?category=${encodeURIComponent(category)}`
                    : '/api/cv-templates/public';
                const res = await fetch(url);
                allTemplates = await res.json();
                renderTemplates(allTemplates);
                buildCategoryFilter(allTemplates);
            } catch (e) {
                document.getElementById('templateGrid').innerHTML =
                    '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#999;">Không thể tải dữ liệu. Vui lòng thử lại.</div>';
            }
        }

        function buildCvMiniature(t) {
            let cv = {};
            try { cv = JSON.parse(t.templateContent || '{}'); } catch(e) {}
            const accent = t.previewColor || '#2E3B8E';
            const esc = escHtml;

            // Skills HTML (left column) — using tag pills for clean uniform look
            const skillsHtml = (cv.skills || []).map(sg => `
                <div class="cvm-skill-group">
                    <div class="cvm-skill-cat">${esc(sg.category)}</div>
                    <div class="cvm-skill-list" style="display:flex; flex-wrap:wrap; gap:5px; margin-top:3px;">
                        ${(sg.items || []).map(item => `
                            <span class="cvm-skill-item">
                                <span style="color:${accent}; font-size:8px;">●</span> ${esc(item)}
                            </span>
                        `).join('')}
                    </div>
                </div>
            `).join('');

            // Education HTML (left column)
            const eduHtml = (cv.education || []).slice(0, 1).map(e => `
                <div class="cvm-edu-item">
                    <div class="cvm-edu-degree">${esc(e.degree || '')}</div>
                    <div class="cvm-edu-school">${esc(e.school || '')}</div>
                    <div class="cvm-edu-year">${esc(e.period || '')}</div>
                    ${(e.details || []).slice(0, 2).map(d => `<div class="cvm-edu-detail">• ${esc(d)}</div>`).join('')}
                </div>`).join('');

            // Experience HTML (right column)
            const expHtml = (cv.experience || []).slice(0, 2).map(e => `
                <div class="cvm-exp-item">
                    <div class="cvm-exp-role">${esc(e.role || '')}</div>
                    <div class="cvm-exp-company">${esc(e.company || '')} &nbsp;|&nbsp; ${esc(e.period || '')}</div>
                    ${(e.details || []).slice(0, 3).map(d => `<div class="cvm-exp-detail">• ${esc(d)}</div>`).join('')}
                </div>`).join('');

            // Summary
            const summaryHtml = cv.summary
                ? `<div class="cvm-section cvm-summary-section">
                    <div class="cvm-section-title" style="color:${accent}; border-bottom:1.5px solid ${accent};">MỤC TIÊU NGHỀ NGHIỆP</div>
                    <div class="cvm-summary-text">${esc(cv.summary)}</div>
                   </div>`
                : '';

            return `
                <div class="cv-miniature" style="--cv-accent:${accent};">
                    <div class="cvm-header" style="background:${accent};">
                        <div class="cvm-avatar"></div>
                        <div class="cvm-header-info">
                            <div class="cvm-name">${esc(cv.name || t.name || '')}</div>
                            <div class="cvm-job-title">${esc(cv.subtitle || '')}</div>
                            <div class="cvm-contact-row">
                                ${cv.email ? `<span>✉ ${esc(cv.email)}</span>` : ''}
                                ${cv.phone ? `<span>☎ ${esc(cv.phone)}</span>` : ''}
                                ${cv.address ? `<span>📍 ${esc(cv.address)}</span>` : ''}
                            </div>
                        </div>
                    </div>
                    <div class="cvm-body">
                        <div class="cvm-left">
                            ${skillsHtml ? `<div class="cvm-section">
                                <div class="cvm-section-title" style="color:${accent};">KỸ NĂNG</div>
                                ${skillsHtml}
                            </div>` : ''}
                            ${eduHtml ? `<div class="cvm-section" style="margin-top:12px;">
                                <div class="cvm-section-title" style="color:${accent};">HỌC VẤN</div>
                                ${eduHtml}
                            </div>` : ''}
                        </div>
                        <div class="cvm-right">
                            ${summaryHtml}
                            ${expHtml ? `<div class="cvm-section" style="margin-top:10px;">
                                <div class="cvm-section-title" style="color:${accent}; border-bottom:1.5px solid ${accent};">KINH NGHIỆM LÀM VIỆC</div>
                                ${expHtml}
                            </div>` : ''}
                        </div>
                    </div>
                </div>`;
        }

        function renderTemplates(templates) {
            const grid = document.getElementById('templateGrid');
            if (!templates.length) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:#999;">Chưa có mẫu CV nào trong danh mục này.</div>';
                return;
            }
            grid.innerHTML = templates.map(t => {
                const bgColor = t.previewColor || '#f8fafc';
                return `
                <div class="template-card">
                    <div class="template-preview" style="background:${bgColor};">
                        <div class="cv-miniature-wrapper">
                            ${buildCvMiniature(t)}
                        </div>
                        <div class="preview-overlay">
                            <span class="preview-overlay-text">Xem trước mẫu</span>
                        </div>
                    </div>
                    <div class="template-info">
                        <div class="template-head">
                            <h3 class="template-title">${escHtml(t.name)}</h3>
                            ${t.badgeLabel ? `<span class="badge-style" style="background:${t.badgeBgColor||'#e2e8f0'};color:${t.badgeTextColor||'#374151'}">${escHtml(t.badgeLabel)}</span>` : ''}
                        </div>
                        <p class="template-desc">${escHtml(t.description || '')}</p>
                        <button class="btn-use-template" data-id="${t.id}">
                            Sử dụng mẫu này
                            <i data-lucide="arrow-right"></i>
                        </button>
                    </div>
                </div>
            `}).join('');
            lucide.createIcons();
            // Attach click handlers -> open modal instead of navigating
            grid.querySelectorAll('.btn-use-template').forEach(btn => {
                btn.addEventListener('click', function() {
                    openCvMethodModal(this.dataset.id);
                });
            });
        }

        function buildCategoryFilter(templates) {
            const categories = [...new Set(templates.map(t => t.category).filter(Boolean))];
            const iconMap = {
                'Công nghệ & IT': 'code-2',
                'Tài chính & Kinh doanh': 'landmark',
                'Marketing & PR': 'megaphone',
                'Thiết kế & Sáng tạo': 'palette',
                'Giáo dục & Hàn lâm': 'graduation-cap'
            };
            const filterList = document.getElementById('categoryFilter');
            // Keep the "All" item, rebuild the rest
            const allItem = filterList.querySelector('[data-category=""]');
            filterList.innerHTML = '';
            filterList.appendChild(allItem);
            categories.forEach(cat => {
                const icon = iconMap[cat] || 'folder';
                const div = document.createElement('div');
                div.className = 'filter-item';
                div.dataset.category = cat;
                div.innerHTML = `<i data-lucide="${icon}"></i><span>${cat}</span>`;
                div.addEventListener('click', () => selectCategory(cat, div));
                filterList.appendChild(div);
            });
            lucide.createIcons();
        }

        function selectCategory(category, el) {
            document.querySelector('.filter-item.active').classList.remove('active');
            el.classList.add('active');
            activeCategory = category;
            if (category) {
                renderTemplates(allTemplates.filter(t => t.category === category));
            } else {
                renderTemplates(allTemplates);
            }
        }

        function escHtml(str) {
            return String(str || '')
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ========================= Modal Logic =========================
        let selectedTemplateId = null;
        let existingCvLoaded = false;
        let existingCvLoading = false;

        function resetExistingCvPicker() {
            const select = document.getElementById('cvExistingSelect');
            const hint = document.getElementById('cvExistingHint');
            if (select) select.value = '';
            if (hint) hint.textContent = 'Chọn một CV đã lưu để áp dụng mẫu mới.';
        }

        function updateProceedState() {
            const selectedMethod = document.querySelector('input[name="cvMethod"]:checked');
            const proceedBtn = document.getElementById('cvMethodProceedBtn');
            const industry = document.getElementById('cvIndustrySelect').value;
            const existingCvId = document.getElementById('cvExistingSelect').value;

            if (!selectedMethod) {
                proceedBtn.disabled = true;
                return;
            }

            if (selectedMethod.value === 'keep_template') {
                proceedBtn.disabled = !industry;
                return;
            }

            if (selectedMethod.value === 'existing_cv') {
                proceedBtn.disabled = !existingCvId;
                return;
            }

            proceedBtn.disabled = false;
        }

        async function loadExistingCvOptions() {
            if (existingCvLoaded || existingCvLoading) return;

            existingCvLoading = true;
            const select = document.getElementById('cvExistingSelect');
            const hint = document.getElementById('cvExistingHint');

            select.innerHTML = '<option value="">Đang tải danh sách CV...</option>';
            select.disabled = true;
            hint.textContent = 'Đang tải danh sách CV đã lưu...';

            try {
                const res = await fetch('/api/user-cv');

                if (res.status === 401) {
                    select.innerHTML = '<option value="">Cần đăng nhập để dùng CV đã lưu</option>';
                    hint.innerHTML = 'Bạn cần <a href="/login.html?redirect=/tao-cv-ai.html" style="color:#1D4ED8;font-weight:700;">đăng nhập</a> để áp dụng mẫu lên CV đã tạo trước đó.';
                    return;
                }

                const data = await res.json();
                const cvList = Array.isArray(data) ? data.slice() : [];
                cvList.sort((a, b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0));

                if (!cvList.length) {
                    select.innerHTML = '<option value="">Chưa có CV nào đã lưu</option>';
                    hint.innerHTML = 'Bạn chưa có CV lưu trong hồ sơ. Hãy tạo mới từ profile hoặc vào <a href="/cv-editor.html" style="color:#1D4ED8;font-weight:700;">trình chỉnh CV</a> để tạo trước.';
                    return;
                }

                select.innerHTML = '<option value="">-- Chọn CV muốn áp dụng mẫu --</option>'
                    + cvList.map(cv => {
                        const updatedAt = cv.updatedAt
                            ? new Date(cv.updatedAt).toLocaleDateString('vi-VN')
                            : 'không rõ ngày';
                        return `<option value="${cv.id}">${escHtml(cv.cvName || 'CV chưa đặt tên')} • Cập nhật ${updatedAt}</option>`;
                    }).join('');
                select.disabled = false;
                hint.textContent = 'Nội dung CV sẽ được giữ lại, chỉ đổi sang mẫu bạn vừa chọn.';
                existingCvLoaded = true;

                if (cvList.length === 1) {
                    select.value = String(cvList[0].id);
                }
            } catch (e) {
                select.innerHTML = '<option value="">Không tải được danh sách CV</option>';
                hint.textContent = 'Không thể tải danh sách CV đã lưu. Vui lòng thử lại.';
            } finally {
                existingCvLoading = false;
                updateProceedState();
            }
        }

        function openCvMethodModal(templateId) {
            selectedTemplateId = templateId;
            // Reset selection state
            document.querySelectorAll('input[name="cvMethod"]').forEach(r => r.checked = false);
            document.getElementById('cvIndustrySelector').classList.remove('visible');
            document.getElementById('cvExistingSelector').classList.remove('visible');
            document.querySelectorAll('.cv-method-option').forEach(o => o.classList.remove('selected'));
            document.getElementById('cvIndustrySelect').value = '';
            resetExistingCvPicker();
            updateProceedState();

            // Inject mini CV preview
            const tpl = allTemplates.find(t => String(t.id) === String(templateId));
            if (tpl) {
                document.getElementById('cvMethodPreviewWrapper').innerHTML = buildCvMiniature(tpl);
                document.getElementById('cvMethodPreviewName').textContent = tpl.name || '';
            }

            // Show backdrop
            const backdrop = document.getElementById('cvMethodModalBackdrop');
            backdrop.classList.add('visible');
            backdrop.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';

            loadExistingCvOptions();
        }

        function closeCvMethodModal() {
            const backdrop = document.getElementById('cvMethodModalBackdrop');
            backdrop.classList.remove('visible');
            backdrop.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        }

        // Close button
        document.getElementById('cvMethodCloseBtn').addEventListener('click', closeCvMethodModal);

        // Click outside modal
        document.getElementById('cvMethodModalBackdrop').addEventListener('click', function(e) {
            if (e.target === this) closeCvMethodModal();
        });

        // ESC key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeCvMethodModal();
        });

        // Radio option selection
        document.querySelectorAll('input[name="cvMethod"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.querySelectorAll('.cv-method-option').forEach(o => o.classList.remove('selected'));
                this.closest('.cv-method-option').classList.add('selected');

                const industrySelector = document.getElementById('cvIndustrySelector');
                const existingSelector = document.getElementById('cvExistingSelector');

                if (this.value === 'keep_template') {
                    industrySelector.classList.add('visible');
                    existingSelector.classList.remove('visible');
                } else if (this.value === 'existing_cv') {
                    industrySelector.classList.remove('visible');
                    existingSelector.classList.add('visible');
                    loadExistingCvOptions();
                } else {
                    industrySelector.classList.remove('visible');
                    existingSelector.classList.remove('visible');
                }

                updateProceedState();
            });
        });

        // Industry select change
        document.getElementById('cvIndustrySelect').addEventListener('change', function() {
            updateProceedState();
        });

        document.getElementById('cvExistingSelect').addEventListener('change', updateProceedState);

        // Proceed button
        document.getElementById('cvMethodProceedBtn').addEventListener('click', function() {
            const selectedMethod = document.querySelector('input[name="cvMethod"]:checked');
            if (!selectedMethod || !selectedTemplateId) return;

            const method = selectedMethod.value;
            let url = `cv-editor.html?template=${selectedTemplateId}&method=${method}`;

            if (method === 'existing_cv') {
                const cvId = document.getElementById('cvExistingSelect').value;
                if (!cvId) return;
                url += `&cvId=${encodeURIComponent(cvId)}`;
            } else if (method === 'keep_template') {
                const industry = document.getElementById('cvIndustrySelect').value;
                if (industry) url += `&industry=${encodeURIComponent(industry)}`;
            }

            window.location.href = url;
        });
        // ================================================================

        // Init
        document.querySelector('.filter-item[data-category=""]').addEventListener('click', function() {
            selectCategory('', this);
        });

        loadTemplates();
    </script>
</body>
</html>
