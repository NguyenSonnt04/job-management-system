<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý việc làm | CoHoiViecLam ADMIN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#f8fafc;--panel:#fff;--line:#e2e8f0;--text:#0f172a;--muted:#64748b;--brand:#2563eb;--brand-2:#1d4ed8;--danger:#dc2626;--sidebar:#0f172a;--sidebar-hover:#1e293b}
        *{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);display:flex;font-size:13px}
        .main{margin-left:260px;min-height:100vh;width:calc(100% - 260px)}.top{height:72px;background:#fff;border-bottom:1px solid var(--line);padding:0 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}.top h1{font-size:20px}.content{padding:28px}
        .toolbar{display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap}.search{padding:9px 14px;border:1px solid var(--line);border-radius:10px;font:inherit;width:320px;background:#fff}.search:focus{outline:none;border-color:var(--brand)}
        .filter-select{padding:9px 14px;border:1px solid var(--line);border-radius:10px;font:inherit;background:#fff;cursor:pointer}
        .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 24px rgba(15,23,42,.06);overflow:hidden}
        .stats{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}.stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 20px;min-width:160px}.stat .num{font-size:28px;font-weight:800;line-height:1}.stat .label{color:var(--muted);margin-top:4px;font-size:12px}
        table{width:100%;border-collapse:collapse}th{text-align:left;padding:12px 16px;background:#f8fafc;border-bottom:2px solid var(--line);font-size:11px;text-transform:uppercase;color:var(--muted);font-weight:700;white-space:nowrap}td{padding:10px 16px;border-bottom:1px solid var(--line);vertical-align:middle}
        tr:hover td{background:#f8fafc}
        .job-title{font-weight:600}
        .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;white-space:nowrap}.badge.active{background:#ecfdf5;color:#047857}.badge.paused{background:#fef3c7;color:#b45309}.badge.closed{background:#f1f5f9;color:#64748b}.badge.pending{background:#eff6ff;color:#2563eb}.badge.rejected{background:#fef2f2;color:#dc2626}
        .type-chip{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;background:#eff6ff;color:#2563eb}
        .btn{border:none;border-radius:8px;padding:6px 12px;font:inherit;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}.btn.secondary{background:#fff;border:1px solid var(--line)}.btn.secondary:hover{background:#f8fafc}.btn.toggle-on{background:#ecfdf5;color:#047857;border:1px solid #a7f3d0}.btn.toggle-off{background:#fef3c7;color:#b45309;border:1px solid #fde68a}.btn.approve{background:#ecfdf5;color:#047857;border:1px solid #a7f3d0}.btn.approve:hover{background:#d1fae5}.btn.reject{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}.btn.reject:hover{background:#fee2e2}
        .actions-cell{display:flex;gap:6px;flex-wrap:wrap}
        .empty{padding:40px 20px;text-align:center;color:var(--muted)}
        .msg{display:none;padding:12px 14px;border-radius:12px;font-size:13px;font-weight:600;margin-bottom:14px}.msg.show{display:block}.msg.ok{background:#ecfdf3;color:#047857;border:1px solid #a7f3d0}.msg.err{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
        .count-info{color:var(--muted);font-size:12px;margin-left:auto}
        .table-wrap{overflow-x:auto}
        .deadline{white-space:nowrap}.deadline.expired{color:var(--danger);font-weight:600}
        @media(max-width:760px){.sidebar{display:none}.main{margin-left:0;width:100%}.search{width:100%}.stats{flex-direction:column}}
    </style>
    <script src="/admin/sidebar.js"></script>
</head>
<body>
    <div class="main">
        <div class="top"><h1>Quản lý việc làm</h1><a class="btn secondary" href="/auth/logout">Đăng xuất</a></div>
        <div class="content">
            <div id="msg" class="msg"></div>
            <div class="stats" id="stats"></div>
            <div class="toolbar">
                <input class="search" id="search" type="text" placeholder="Tìm theo tiêu đề, công ty, địa điểm...">
                <select class="filter-select" id="statusFilter">
                    <option value="">Tất cả trạng thái</option>
                    <option value="PENDING">Chờ duyệt</option>
                    <option value="ACTIVE">Active</option>
                    <option value="PAUSED">Paused</option>
                    <option value="CLOSED">Closed</option>
                    <option value="REJECTED">Từ chối</option>
                </select>
                <select class="filter-select" id="typeFilter">
                    <option value="">Tất cả loại hình</option>
                </select>
                <span class="count-info" id="countInfo"></span>
            </div>
            <div class="card">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Tiêu đề</th>
                                <th>Công ty</th>
                                <th>Địa điểm</th>
                                <th>Loại hình</th>
                                <th>Trạng thái</th>
                                <th>Hạn nộp</th>
                                <th>Ngày tạo</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="tbody">
                            <tr><td colspan="8" class="empty">Đang tải dữ liệu...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script>
        let jobs=[];
        const esc=v=>String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        const fmt=v=>v?new Date(v).toLocaleDateString('vi-VN'):'—';
        const $=id=>document.getElementById(id);

        function setMsg(type,text){const m=$('msg');m.className=`msg show ${type}`;m.textContent=text;setTimeout(()=>m.className='msg',4000)}

        function isExpired(d){if(!d)return false;return new Date(d)<new Date()}

        function getFiltered(){
            const q=$('search').value.toLowerCase().trim();
            const status=$('statusFilter').value;
            const type=$('typeFilter').value;
            return jobs.filter(j=>{
                if(q&&!(`${j.title} ${j.companyName} ${j.location}`).toLowerCase().includes(q))return false;
                if(status&&j.status!==status)return false;
                if(type&&j.employmentType!==type)return false;
                return true;
            });
        }

        function renderStats(){
            const total=jobs.length;
            const pending=jobs.filter(j=>j.status==='PENDING').length;
            const active=jobs.filter(j=>j.status==='ACTIVE').length;
            const paused=jobs.filter(j=>j.status==='PAUSED').length;
            const rejected=jobs.filter(j=>j.status==='REJECTED').length;
            $('stats').innerHTML=`
                <div class="stat"><div class="num">${total}</div><div class="label">Tổng việc làm</div></div>
                <div class="stat"><div class="num" style="color:#2563eb">${pending}</div><div class="label">Chờ duyệt</div></div>
                <div class="stat"><div class="num" style="color:#047857">${active}</div><div class="label">Đang tuyển</div></div>
                <div class="stat"><div class="num" style="color:#b45309">${paused}</div><div class="label">Tạm dừng</div></div>
                <div class="stat"><div class="num" style="color:#dc2626">${rejected}</div><div class="label">Từ chối</div></div>`;
            // populate type filter
            const types=[...new Set(jobs.map(j=>j.employmentType).filter(Boolean))].sort();
            const sel=$('typeFilter');
            const current=sel.value;
            sel.innerHTML='<option value="">Tất cả loại hình</option>'+types.map(t=>`<option value="${esc(t)}"${t===current?' selected':''}>${esc(t)}</option>`).join('');
        }

        function statusClass(s){return(s||'').toLowerCase()}
        function statusLabel(s){const m={ACTIVE:'Active',PAUSED:'Tạm dừng',CLOSED:'Đã đóng',PENDING:'Chờ duyệt',REJECTED:'Từ chối'};return m[s]||s}

        function render(){
            const filtered=getFiltered();
            $('countInfo').textContent=`Hiển thị ${filtered.length} / ${jobs.length} việc làm`;
            if(!filtered.length){$('tbody').innerHTML='<tr><td colspan="8" class="empty">Không tìm thấy việc làm nào.</td></tr>';return}
            $('tbody').innerHTML=filtered.map(j=>{
                const exp=isExpired(j.deadline);
                const canToggle=j.status==='ACTIVE'||j.status==='PAUSED';
                const isPending=j.status==='PENDING';
                return `<tr>
                <td><span class="job-title">${esc(j.title)}</span></td>
                <td>${esc(j.companyName||'—')}</td>
                <td>${esc(j.location||'—')}</td>
                <td>${j.employmentType?`<span class="type-chip">${esc(j.employmentType)}</span>`:'—'}</td>
                <td><span class="badge ${statusClass(j.status)}">${statusLabel(j.status)}</span></td>
                <td><span class="deadline${exp?' expired':''}">${fmt(j.deadline)}${exp?' (Hết hạn)':''}</span></td>
                <td style="white-space:nowrap">${fmt(j.createdAt)}</td>
                <td><div class="actions-cell">
                    ${isPending?`<button class="btn approve" onclick="approveJob(${j.id})">Duyệt</button><button class="btn reject" onclick="rejectJob(${j.id})">Từ chối</button>`:''}
                    ${canToggle?`<button class="btn ${j.status==='ACTIVE'?'toggle-off':'toggle-on'}" onclick="toggleJob(${j.id})">${j.status==='ACTIVE'?'Tạm dừng':'Kích hoạt'}</button>`:''}
                    ${!isPending&&!canToggle?'<span style="color:var(--muted);font-size:12px">—</span>':''}
                </div></td>
            </tr>`}).join('');
        }

        async function load(){
            try{
                const r=await fetch('/api/admin/jobs',{credentials:'include'});
                if(!r.ok)throw new Error('Không thể tải danh sách');
                jobs=await r.json();
                renderStats();render();
            }catch(e){$('tbody').innerHTML=`<tr><td colspan="8" class="empty">${esc(e.message)}</td></tr>`}
        }

        async function toggleJob(id){
            try{
                const r=await fetch(`/api/admin/jobs/${id}/toggle`,{method:'PATCH',credentials:'include'});
                if(!r.ok)throw new Error('Không thể thay đổi trạng thái');
                const j=jobs.find(x=>x.id===id);
                setMsg('ok',`Đã ${j&&j.status==='ACTIVE'?'tạm dừng':'kích hoạt'} tin tuyển dụng.`);
                await load();
            }catch(e){setMsg('err',e.message)}
        }

        async function approveJob(id){
            try{
                const r=await fetch(`/api/admin/jobs/${id}/approve`,{method:'PATCH',credentials:'include'});
                if(!r.ok)throw new Error('Không thể duyệt tin');
                setMsg('ok','Đã duyệt tin tuyển dụng.');
                await load();
            }catch(e){setMsg('err',e.message)}
        }

        async function rejectJob(id){
            if(!confirm('Từ chối tin tuyển dụng này?'))return;
            try{
                const r=await fetch(`/api/admin/jobs/${id}/reject`,{method:'PATCH',credentials:'include',headers:{'Content-Type':'application/json'},body:'{}'});
                if(!r.ok)throw new Error('Không thể từ chối tin');
                setMsg('ok','Đã từ chối tin tuyển dụng.');
                await load();
            }catch(e){setMsg('err',e.message)}
        }

        $('search').addEventListener('input',render);
        $('statusFilter').addEventListener('change',render);
        $('typeFilter').addEventListener('change',render);
        window.toggleJob=toggleJob;
        window.approveJob=approveJob;
        window.rejectJob=rejectJob;
        load();
    </script>
</body>
</html>
