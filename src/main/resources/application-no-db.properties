# Profile: No Database - Chạy ứng dụng mà không cần MySQL
# Sử dụng: java -jar app.jar --spring.profiles.active=no-db

# Tắt JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.defer-datasource-initialization=true

# Tắt auto-configuration cho DataSource
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfigurer,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfigurer

# Hoặc sử dụng H2 in-memory database (fallback)
#spring.datasource.url=jdbc:h2:mem:qltd_db
#spring.datasource.driver-class-name=org.h2.Driver
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
