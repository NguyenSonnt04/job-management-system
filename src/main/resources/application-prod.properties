spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.sql.init.mode=never
spring.thymeleaf.cache=true

spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:8}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}

server.forward-headers-strategy=framework
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${SERVER_SERVLET_SESSION_COOKIE_SECURE:true}

app.seed.demo-data=${APP_SEED_DEMO_DATA:false}
app.bootstrap.default-admin.email=${APP_DEFAULT_ADMIN_EMAIL:}
app.bootstrap.default-admin.password=${APP_DEFAULT_ADMIN_PASSWORD:}
app.bootstrap.default-admin.full-name=${APP_DEFAULT_ADMIN_FULL_NAME:Production Admin}
app.bootstrap.default-admin.phone=${APP_DEFAULT_ADMIN_PHONE:0900000000}
