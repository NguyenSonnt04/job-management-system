<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truy cập bị từ chối - 403</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            text-align: center;
            padding: 40px;
            max-width: 500px;
        }
        .error-code {
            font-size: 80px;
            font-weight: 700;
            color: #1a1a1a;
            line-height: 1;
            margin-bottom: 10px;
        }
        .error-title {
            font-size: 18px;
            font-weight: 600;
            color: #333333;
            margin-bottom: 12px;
        }
        .error-message {
            font-size: 14px;
            color: #666666;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .btn-home {
            display: inline-block;
            padding: 10px 24px;
            background: #1a1a1a;
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            border: 1px solid #1a1a1a;
            transition: background 0.15s, border-color 0.15s;
        }
        .btn-home:hover {
            background: #333333;
            border-color: #333333;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">403</div>
        <h1 class="error-title">Truy cập bị từ chối</h1>
        <p class="error-message">
            Xin lỗi, bạn không có quyền truy cập trang này.
            Vui lòng đăng nhập hoặc liên hệ quản trị viên để được cấp quyền.
        </p>
        <a href="/" class="btn-home">Về trang chủ</a>
    </div>
</body>
</html>
